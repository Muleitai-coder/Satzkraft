.importdrop{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px;border:1px dashed #3b4654;border-radius:12px;background:#10151b;margin:10px 0}
.importtextwrap{position:relative}
.importtextwrap .libta{padding-right:82px}
.importclear{position:absolute;top:8px;right:8px;border:1px solid #313a46;border-radius:8px;background:#242b35;color:#d4d4d8;padding:5px 8px;font-size:10px;font-weight:700;cursor:pointer}
.importclear[hidden]{display:none}
.importdrop strong{display:block;font-size:12px}
.importdrop small{display:block;color:#71717a;font-size:10px;margin-top:3px}
.importnotice{border:1px solid #2b3440;border-radius:12px;background:#10151b;padding:12px 13px;margin:10px 0;color:#a1a1aa;font-size:11px;line-height:1.5}
.importnotice strong{display:block;color:#e4e4e7;font-size:12px;margin-bottom:3px}
.importnotice.ok{border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.07);color:#a7f3d0}
.importnotice.ok strong{color:#d1fae5}
.importnotice.warn{border-color:rgba(245,158,11,.38);background:rgba(245,158,11,.07);color:#fde68a}
.importnotice.warn strong{color:#fef3c7}
.importnotice.err{border-color:rgba(248,113,113,.38);background:rgba(127,29,29,.12);color:#fca5a5}
.importnotice.err strong{color:#fecaca}
.importtechnical{margin:10px 0;border:1px solid #2b3440;border-radius:10px;overflow:hidden}
.importtechnical>summary{list-style:none;cursor:pointer;padding:10px 11px;color:#a1a1aa;font-size:11px;font-weight:700}
.importtechnical>summary::-webkit-details-marker{display:none}
.importtechnical pre{margin:0;padding:11px;border-top:1px solid #2b3440;background:#0a0d12;color:#a1a1aa;font:10px/1.5 ui-monospace,Menlo,monospace;white-space:pre-wrap;overflow-wrap:anywhere}
.previewhero{border:1px solid rgba(16,185,129,.38);border-radius:14px;background:linear-gradient(135deg,rgba(16,185,129,.14),rgba(13,148,136,.05));padding:15px;margin-bottom:12px}
.previewhero h2{font-size:18px;line-height:1.3;margin:0 0 5px;overflow-wrap:anywhere}
.previewhero p{margin:0;color:#a1a1aa;font-size:11px;line-height:1.5}
.previewstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:13px}
.previewstat{background:rgba(10,13,18,.42);border-radius:9px;padding:9px;text-align:center}
.previewstat b{display:block;color:#fafafa;font-size:16px}
.previewstat span{display:block;color:#8b949e;font-size:9px;margin-top:2px}
.previewdays{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:10px 0}
.previewday{border:1px solid #2b3440;border-radius:10px;background:#10151b;padding:10px 11px;min-width:0}
.previewday b{display:block;font-size:11px;overflow-wrap:anywhere}
.previewday span{display:block;color:#71717a;font-size:10px;margin-top:4px}
.importactions{position:sticky;bottom:-18px;z-index:2;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:16px -18px -18px;padding:12px 18px calc(12px + env(safe-area-inset-bottom));border-top:1px solid #242b35;background:rgba(20,25,32,.97)}
.importactions .smallbtn{min-height:42px;white-space:normal}
.importactions .wide{grid-column:1/-1}
.manualgrid{display:grid;grid-template-columns:1fr 150px;gap:10px}
.manualdays{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin:9px 0 4px}
.manualday{min-width:0;min-height:44px;border:1px solid #313a46;border-radius:10px;background:#10151b;color:#a1a1aa;font-size:10px;font-weight:800;cursor:pointer}
.manualday.sel{background:#10b981;border-color:#10b981;color:#052e16}
.manualhint{color:#71717a;font-size:10px;line-height:1.45;margin-top:7px}
.sourcepill{display:inline-flex;align-items:center;border:1px solid #313a46;border-radius:999px;padding:4px 8px;color:#a1a1aa;font-size:9px;font-weight:750;margin-bottom:8px}
.versionfoot{display:flex;justify-content:center;margin:22px auto 2px;color:#71717a;font-size:10px;font-weight:650;letter-spacing:.03em;background:none;border:0;padding:4px;cursor:pointer;text-decoration:underline;text-decoration-color:#3f4652;text-underline-offset:3px}
.versionintro{margin:9px 0 12px;line-height:1.5}.versionhistory{display:grid;gap:8px;text-align:left}.versionentry{border:1px solid #313a46;border-radius:11px;background:#10151b;overflow:hidden}.versionentry>summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px}.versionentry>summary::-webkit-details-marker{display:none}.versionentry>summary:after{content:"";width:7px;height:7px;flex:none;border-right:2px solid #71717a;border-bottom:2px solid #71717a;transform:rotate(45deg);transition:transform .15s}.versionentry[open]>summary:after{transform:rotate(225deg)}.versionentry[open]>summary{border-bottom:1px solid #313a46}.versiontitle{display:block;color:#e4e4e7;font-size:12px}.versiondate{display:block;color:#71717a;font-size:9px;margin-top:2px}.versionbody{padding:10px 12px}.versionbody p{margin:0 0 8px;color:#a1a1aa;font-size:10px;line-height:1.45}.versionbody ul{margin:0;padding-left:18px}.versionbody li{margin:0 0 7px;line-height:1.45;font-size:11px}.legendversion{display:inline;background:none;border:0;padding:0;cursor:pointer;text-decoration:underline;text-decoration-color:#3f4652;text-underline-offset:3px}
.developercredit{display:block;margin-top:5px;color:#a1a1aa;font-size:10px;font-weight:650;letter-spacing:.02em}
:focus-visible{outline:2px solid #34d399;outline-offset:2px}
.inp:focus-visible,.libta:focus-visible{outline:none}
@media(hover:hover){
.bbtn:hover,.mbtn:hover,.smallbtn:hover,.histbtn:hover,.nav:hover:not(:disabled),.pausebtn:hover:not(:disabled){filter:brightness(1.12)}
.linkbtn:hover,.iconbtn:hover{color:#a1a1aa}

var loadIssueRaw="",loadIssueText="",storageErrorShown=false;

 try{r=localStorage.getItem(KEY)||"";if(r){var v=JSON.parse(r);return normalize(v);}}catch(e){loadIssueRaw=r;loadIssueText="Die gespeicherten Trainingsdaten konnten nicht gelesen werden.";}
 var r2="";
 try{r2=localStorage.getItem("cali-plan-v2")||"";if(r2){var o=JSON.parse(r2);var s=initState();var st=s.store["default"];st.tg=o.tg||{};st.logs=o.logs||{};st.history=Array.isArray(o.history)?o.history:[];st.workout=o.workout||null;st.week=o.week||1;st.day=o.day||"A";s.schemaVersion=DATA_SCHEMA_VERSION;alias(s);return s;}}catch(e){if(!loadIssueRaw)loadIssueRaw=r2;if(!loadIssueText)loadIssueText="Alte Trainingsdaten konnten nicht wiederhergestellt werden.";}

}
function migrateProgram(p){
 // Alt-Format (type/repRanges/sStr…) → daten-getriebene Kategorien
 if(p.categories)return p;
 var rr=p.repRanges||{};
 p.categories={
  strength:{label:"Kraft",color:"amber",rest:150,reps:rr.strength||{aufbau:[5,7],intensiv:[3,5],deload:[5,5]}},
  hyp:{label:"Hypertrophie",color:"emerald",rest:90,reps:rr.hyp||{aufbau:[8,12],intensiv:[6,10],deload:[10,10]}},
  skill:{label:"Skill",color:"violet",rest:150,reps:null},
  core:{label:"Core",color:"sky",rest:60,reps:null}

 (p.weeks||[]).forEach(function(w){if(!w.sets){w.sets={strength:w.sStr,hyp:w.sHyp,skill:w.sSkl,core:w.sSkl};}delete w.sStr;delete w.sHyp;delete w.sSkl;});
 (p.days||[]).forEach(function(d){(d.ex||[]).forEach(function(e){if(e.cat===undefined)e.cat=e.type;if(e.unit===undefined)e.unit="reps";delete e.type;});});
 delete p.repRanges;
 return p;
}
function normalize(v){
 if(!v.programs)v.programs={};
 var programIds=Object.keys(v.programs);
 if(!programIds.length){v.programs["default"]=clone(DEFAULT_PROGRAM);programIds=["default"];}
 for(var pid in v.programs)migrateProgram(v.programs[pid]);
 if(!v.store)v.store={};
 if(!v.active||!v.programs[v.active])v.active=programIds[0];
 var p=v.programs[v.active];
 if(!v.store[v.active])v.store[v.active]=newStore(p);
 var st=v.store[v.active];
 if(!st.tg||typeof st.tg!=="object"||Array.isArray(st.tg))st.tg={};
 if(!st.logs||typeof st.logs!=="object"||Array.isArray(st.logs))st.logs={};
 if(!Array.isArray(st.history))st.history=[];
 var keys=p.days.map(function(d){return d.key;});
 if(keys.indexOf(st.day)<0)st.day=keys[0];
 if(!st.week||st.week>p.weeks.length)st.week=Math.min(st.week||1,p.weeks.length);if(st.week<1)st.week=1;
 if(st.workout){
  if(!st.workout.week)st.workout.week=st.week;
  if(!st.workout.day)st.workout.day=st.day;
  st.week=st.workout.week;
  if(keys.indexOf(st.workout.day)>=0)st.day=st.workout.day;
 }
 v.schemaVersion=DATA_SCHEMA_VERSION;alias(v);return v;
}
function syncStore(){S.store[S.active]={tg:S.tg,logs:S.logs,history:S.history,workout:S.workout,week:S.week,day:S.day};}

  localStorage.setItem(KEY,JSON.stringify({schemaVersion:DATA_SCHEMA_VERSION,programs:S.programs,active:S.active,store:S.store}));
  storageErrorShown=false;return true;

  if(!storageErrorShown){storageErrorShown=true;setTimeout(function(){showModal("Speichern fehlgeschlagen","Deine aktuellen Daten sind noch in der geöffneten App, konnten aber nicht dauerhaft gespeichert werden. Bitte jetzt ein Backup herunterladen und erst danach die Seite schließen.",[{label:"Backup speichern",cls:"primary",action:function(){downloadText("satzkraft-notfall-backup.json",backupJSON());}},{label:"Schließen",action:null}]);},0);}
  return false;
 }
}

// ---------- Programm-Zugriff ----------
function PROG(){return S.programs[S.active];}
function dayKeys(){return PROG().days.map(function(d){return d.key;});}
function dayByKey(k){var ds=PROG().days;for(var i=0;i<ds.length;i++)if(ds[i].key===k)return ds[i];return ds[0];}
function wdSlot(d){var k=String(d.wd||"").trim().toLowerCase();var idx=WD_MAP[k];if(idx==null)idx=WD_MAP[k.split(/[\s\-\/.,]/)[0]];return(idx==null?null:idx);}
function weekLayout(){
 var slots=[null,null,null,null,null,null,null],pending=[];
 PROG().days.forEach(function(d){var idx=wdSlot(d);if(idx!=null&&slots[idx]==null)slots[idx]=d;else pending.push(d);});
 pending.forEach(function(d){for(var i=0;i<7;i++){if(slots[i]==null){slots[i]=d;break;}}});
 return slots;
}
function dayStatus(d){
 var all=d.ex.length,dn=0;for(var i=0;i<all;i++)if(cellComplete(S.week,d.key,d.ex[i]))dn++;
 return{dn:dn,all:all,complete:all>0&&dn===all};
}
function wfOf(W){return W.phase==="deload"?getWorkoutSettings().deloadMultiplier:1.0;}
function CATS(){return PROG().categories||{};}
function catOf(ex){return CATS()[ex.cat]||{};}
function catLabel(ex){var c=catOf(ex);return c.label||ex.cat||"";}
function catColor(ex){var c=catOf(ex).color;return CAT_COLORS.indexOf(c)>=0?c:"slate";}
function catRest(ex){var r=catOf(ex).rest;return r>0?r:90;}
function restLabel(sec){if(!sec)return "–";if(sec<60)return sec+" s";return sec%60===0?(sec/60)+" min":fmtTime(sec)+" min";}
function isTime(ex){return ex.unit==="seconds";}
function timeMode(ex){if(!isTime(ex))return null;if(ex.tmode==="target"||ex.tmode==="max")return ex.tmode;return /(?:^|\s)(?:max|maximal|so lange)(?:\s|\.|$)/i.test(String(ex.target||""))?"max":"target";}
function timeInputUsesMinutes(ex,range){return isTime(ex)&&Array.isArray(range)&&Math.max(Number(range[0])||0,Number(range[1])||0)>=120;}
function timeInputValue(seconds,minutes){return seconds===""||seconds==null?"":(minutes?fmtMinuteInput(seconds):String(seconds));}
function timeInputSeconds(input,ex){if(!isTime(ex)||input.dataset.timeScale!=="60")return sanInt(input.value);var clean=sanDec(input.value);input.value=clean;return clean===""?"":String(Math.max(0,Math.round(Number(clean)*60)));}
function setTimeInputValue(input,ex,seconds){var minutes=input&&input.dataset.timeScale==="60";if(input)input.value=timeInputValue(seconds,minutes);}
function catReps(ex,phase){if(Array.isArray(ex.reps))return ex.reps;var r=catOf(ex).reps;return(r&&r[phase])?r[phase]:null;}
function setsForWeek(catKey,w){var W=PROG().weeks[w-1];if(!W)return 0;var s=W.sets&&W.sets[catKey];return(s!=null)?s:3;}
function setsForExercise(ex,w){return ex.sets!=null?ex.sets:setsForWeek(ex.cat,w);}

function getSets(ex){var n=setsForExercise(ex,S.week);var cur=S.logs[S.week+"|"+S.day+"|"+ex.id]||{sets:[]};var out=[];for(var i=0;i<n;i++)out.push(cur.sets[i]||{reps:"",weight:""});return out;}
function writeSets(ex,sets){S.logs[S.week+"|"+S.day+"|"+ex.id]={sets:sets};}
function setComplete(ex,s){return ex.w?(s.reps!==""&&s.weight!==""):(s.reps!=="");}
function firstOpenSet(ex,sets){sets=sets||getSets(ex);for(var i=0;i<sets.length;i++)if(!setComplete(ex,sets[i]))return i;return sets.length;}
function cellComplete(w,dk,ex){var need=setsForExercise(ex,w);var c=S.logs[w+"|"+dk+"|"+ex.id];if(!c||!c.sets||!need)return false;var cnt=0;for(var i=0;i<need;i++){var s=c.sets[i];if(s&&setComplete(ex,s))cnt++;}return cnt===need;}
function isDone(ex){return cellComplete(S.week,S.day,ex);}

function actualMinWeight(ex,w){var c=S.logs[w+"|"+S.day+"|"+ex.id],need=setsForExercise(ex,w),m=Infinity;if(!c||!c.sets)return null;for(var i=0;i<need;i++){var s=c.sets[i];if(s&&s.weight!==""){var x=Number(s.weight);if(x<m)m=x;}}return m===Infinity?null:m;}

/* =====================================================================
   COACH / PROGRESSION MODUL  (reine Logik, von der UI getrennt)
   - Workout-JSON liefert nur Daten/Parameter (settings, progressionMode).
   - App-Speicher liefert die Historie (S.logs / S.history).
   - Dieses Modul rechnet daraus die Empfehlung. UI ruft buildCoachMessage().
   ===================================================================== */
function getWorkoutSettings(prog){return PROGRESSION.getWorkoutSettings(prog||PROG());}
function getExerciseProgressionMode(ex){return PROGRESSION.getExerciseProgressionMode(ex);}
// Sätze einer Übung in Woche w als saubere Session [{reps,weight}] – oder null falls leer.
function sessionFor(ex,w){
 var c=S.logs[w+"|"+S.day+"|"+ex.id];if(!c||!c.sets)return null;
 var need=setsForExercise(ex,w),sets=[],any=false;
 for(var i=0;i<need;i++){var s=c.sets[i]||{reps:"",weight:""};if(s.reps!=="")any=true;sets.push({reps:s.reps,weight:s.weight});}
 return any?sets:null;
}
// Frühere Sessions (neueste zuerst), für "zwei Einheiten in Folge"-Regel.
function priorSessions(ex,w){var out=[];for(var k=w-1;k>=1;k--){var s=sessionFor(ex,k);if(s)out.push(s);}return out;}
function calculateNextRecommendation(p){return PROGRESSION.calculateNextRecommendation(p);}
// Bindeglied: holt die Daten aus dem App-Speicher und ruft die reine Logik.
function recommendForWeek(ex,w){
 var W=PROG().weeks[w-1],phase=W?W.phase:"aufbau",prior=priorSessions(ex,w);
 // Im Deload wird die schwere Basis genau einmal reduziert. Das bereits
 // reduzierte, eingetragene Deload-Gewicht darf nicht erneut skaliert werden.
 var curW=phase==="deload"?baseWeight(ex,w):actualMinWeight(ex,w);if(curW==null)curW=baseWeight(ex,w);
 return calculateNextRecommendation({
  exercise:ex,settings:getWorkoutSettings(),repRange:catReps(ex,phase),currentWeight:curW,
  currentSession:sessionFor(ex,w),lastSession:prior[0]||null,previousSession:prior[1]||null,
  isDeload:phase==="deload"
 });
}
// Schwere-Basis-Kette (für Ziel-/Arbeitsgewicht). Deload ändert die schwere Basis nicht.
function nextWeight(ex,w){
 var W=PROG().weeks[w-1];if(!W||W.phase==="deload")return null;
 var mode=getExerciseProgressionMode(ex);if(mode!=="weight"&&mode!=="added_weight")return null;
 if(!cellComplete(w,S.day,ex))return null;
 var rec=recommendForWeek(ex,w);
 if(rec.action==="increase"||rec.action==="decrease"||rec.action==="hold")return rec.nextWeight;
 return null;
}
function baseWeight(ex,w){
 var ov=S.tg[w+"|"+ex.id];if(ov!=null&&ov!=="")return Number(ov);
 if(w<=1)return ex.def||0;
 var nw=nextWeight(ex,w-1);if(nw!=null)return nw;
 var base=baseWeight(ex,w-1),prevW=PROG().weeks[w-2];
 if(prevW&&prevW.phase==="deload"){var mode=getExerciseProgressionMode(ex);if(mode==="weight"||mode==="added_weight")return round(base*getWorkoutSettings().postDeloadReturnMultiplier);}
 return base;
}
function targetWeight(ex){return round(baseWeight(ex,S.week)*wfOf(PROG().weeks[S.week-1]));}
function lastPerf(ex){for(var w=S.week-1;w>=1;w--){var c=S.logs[w+"|"+S.day+"|"+ex.id];if(c&&c.sets&&c.sets.some(function(s){return s.reps!==""&&s.reps!=null;}))return{week:w,sets:c.sets};}return null;}
function weekFrac(w){var d=0,t=0,ds=PROG().days;for(var a=0;a<ds.length;a++)for(var i=0;i<ds[a].ex.length;i++){t++;if(cellComplete(w,ds[a].key,ds[a].ex[i]))d++;}return t?d/t:0;}
function dayComplete(w,dk){
 var day=dayByKey(dk);
 return day.ex.length>0&&day.ex.every(function(ex){return cellComplete(w,dk,ex);});
}
function dayWasInterrupted(w,dk){
 return S.history.some(function(e){return e.week===w&&e.day===dk&&e.complete!==true;});
}
function historyForDay(w,dk){return S.history.filter(function(e){return e.week===w&&e.day===dk;});}
function replaceDayHistory(w,dk,entry){
 for(var i=S.history.length-1;i>=0;i--)if(S.history[i].week===w&&S.history[i].day===dk)S.history.splice(i,1);
 S.history.unshift(entry);
}
function resetDayLogs(w,dk){
 var prefix=w+"|"+dk+"|";
 for(var key in S.logs)if(key.indexOf(prefix)===0)delete S.logs[key];
}
function changeWeek(target){
 if(active()||target===S.week||target<1||target>PROG().weeks.length)return;
 S.week=target;save();renderView();renderBar();
}
function changeDay(target){
 if(active()||target===S.day||dayKeys().indexOf(target)<0)return;
 S.day=target;save();renderView();renderBar();
}
function skippedBeforeSelection(){
 var ordered=weekLayout().filter(function(day){return !!day;});
 var currentIndex=ordered.map(function(day){return day.key;}).indexOf(S.day);
 var skipped=[];
 for(var w=1;w<=S.week;w++){
  var limit=w===S.week?currentIndex:ordered.length;
  for(var i=0;i<limit;i++)if(!dayComplete(w,ordered[i].key))skipped.push({week:w,day:ordered[i]});
 }
 return skipped;
}
function findEx(id){var ex=dayByKey(S.day).ex;for(var i=0;i<ex.length;i++)if(ex[i].id===id)return ex[i];return null;}
function active(){return !!S.workout;}

var REC_COLOR={increase:"emerald",hold:"amber",decrease:"orange",deload:"sky",technique:"amber",progression:"emerald"};
function recHtml(ex){
 if(!isDone(ex))return "";
 var rec=recommendForWeek(ex,S.week);
 if(isTime(ex)&&timeMode(ex)==="target"&&rec.action==="increase"){rec.message="Zielzeit geschafft: Schwierigkeit erhöhen";rec.reason="Widerstand, Tempo oder Übungsvariante leicht steigern; die Zielzeit bleibt bestehen.";}
 if(rec.action==="none"||!rec.message)return "";
 var color=REC_COLOR[rec.action]||"amber";
 return '<div class="rec '+color+'">'+icon("external")+'<span><b>'+esc(rec.message)+'</b>'+(rec.reason?'<br><span style="opacity:.8">'+esc(rec.reason)+'</span>':'')+'</span></div>';
}

function setRowHtml(ex,i,s,rr,tw,dis,firstOpen,canHold){

 if(isTime(ex)){var swRunning=restPhase==="hold"&&restExId===ex.id&&restNextSet===i,swOn=swRunning||(!!canHold&&i===firstOpen);h+='<span class="timefield">'+repInput+'<button class="swbtn'+(swRunning?" running":"")+'" data-hold-row="'+esc(ex.id)+'" data-i="'+i+'" aria-label="'+(swRunning?'Timer stoppen und Zeit eintragen':esc(ex.name)+' Satz '+(i+1)+': Zeit mit Timer messen')+'" title="'+(swRunning?'Stoppen & eintragen':'Timer starten')+'"'+(swOn?'':' disabled')+'>'+icon(swRunning?"stop":"timer")+'</button></span>';}
 else h+=repInput;

 h+='<span class="unit">'+(isTime(ex)?(minuteInput?"min":"Sek"):"Wdh")+'</span>';
 if(ex.w){h+=stpBtn(ex,i,"wt",-1,dis)+'<input class="inp" id="wt-'+ex.id+'-'+i+'" inputmode="decimal" aria-label="'+esc(ex.name)+' Satz '+(i+1)+' Gewicht in kg" placeholder="'+wPH+'" value="'+s.weight+'"'+dis+'>'+stpBtn(ex,i,"wt",1,dis)+'<span class="unit">kg</span>';}
 return h+'</div>';

function exHistory(ex){
 var rows=[];
 for(var w=1;w<=PROG().weeks.length;w++){
  var c=S.logs[w+"|"+S.day+"|"+ex.id];if(!c||!c.sets)continue;
  var need=setsForExercise(ex,w),parts=[],vol=0,has=false;
  var e1=0;
  for(var i=0;i<need;i++){var s=c.sets[i];if(s&&s.reps!==""){has=true;if(ex.w&&s.weight!==""&&Number(s.weight)>0){parts.push(s.reps+"×"+s.weight);vol+=Number(s.reps)*Number(s.weight);var est=Number(s.weight)*(1+Number(s.reps)/30);if(est>e1)e1=est;}else{parts.push(isTime(ex)?fmtSeconds(s.reps):(""+s.reps));}}}
  if(has)rows.push({w:w,label:PROG().weeks[w-1].label,parts:parts,vol:vol,e1:e1>0?round(e1):null});
 }
 return rows;
}
function sparkline(vals){
 var w=280,h=44,min=Math.min.apply(null,vals),max=Math.max.apply(null,vals);
 if(max===min)max=min+1;
 var pts=vals.map(function(v,i){return((i/(vals.length-1))*(w-8)+4).toFixed(1)+","+(((1-(v-min)/(max-min))*(h-10))+5).toFixed(1);}).join(" ");
 return '<svg width="100%" viewBox="0 0 '+w+' '+h+'" style="display:block;margin:2px 0 10px" aria-hidden="true"><polyline points="'+pts+'" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function showHistory(ex){
 var rows=exHistory(ex),body;
 if(!rows.length){body='<p style="color:#71717a;margin:0">Für diese Übung wurde noch nichts eingetragen.</p>';}
 else{
  var e1s=rows.map(function(r){return r.e1;}).filter(function(v){return v!=null;});
  body="";
  if(ex.w&&e1s.length>=2)body+='<div style="font-size:11px;color:#71717a;margin-bottom:2px">Geschätztes 1RM: '+e1s[0]+' → '+e1s[e1s.length-1]+' kg</div>'+sparkline(e1s);
  body+='<table class="htbl"><thead><tr><th>Woche</th><th>Sätze'+(ex.w?' (Wdh×kg)':(isTime(ex)?' (Zeit)':' (Wdh)'))+'</th>'+(ex.w?'<th style="text-align:right">Vol.</th>':'')+'</tr></thead><tbody>';
  rows.forEach(function(r){
   body+='<tr'+(r.w===S.week?' class="cur"':'')+'><td class="wk">W'+r.w+'<span class="hwl">'+esc(r.label)+'</span></td><td>'+esc(r.parts.join(" · "))+'</td>'+(ex.w?'<td class="vol">'+(r.vol>0?r.vol+" kg":"–")+'</td>':'')+'</tr>';
  });
  body+='</tbody></table>';
 }
 showModal("Verlauf · "+esc(ex.name),body,[{label:"Schließen",cls:"primary",action:null}]);
}
var expandedDoneExercises={};
// Fertige Übungen klappen nicht sofort zu: erst nach kurzer Ruhezeit oder sobald in einer anderen Übung etwas eingetragen wird.
var doneCollapseTimers={},DONE_COLLAPSE_DELAY=12000;
function cancelDoneCollapse(exid){var t=doneCollapseTimers[exid];if(t){clearTimeout(t);delete doneCollapseTimers[exid];}}
function cancelAllDoneCollapse(){Object.keys(doneCollapseTimers).forEach(cancelDoneCollapse);}
function replaceCardKeepingViewport(card,html){
 var anchor=document.activeElement&&document.activeElement.closest?document.activeElement.closest(".ex"):null,top=anchor&&anchor!==card?anchor.getBoundingClientRect().top:null;
 card.outerHTML=html;
 if(anchor&&top!=null&&document.body.contains(anchor)){var delta=anchor.getBoundingClientRect().top-top;if(Math.abs(delta)>.5)window.scrollBy(0,delta);}
}
function collapseDoneCard(ex){
 cancelDoneCollapse(ex.id);
 var card=document.getElementById("card-"+ex.id);
 if(!card||card.classList.contains("excompact"))return;
 if(!active()||!isDone(ex)||expandedDoneExercises[ex.id])return;
 if(card.contains(document.activeElement)){scheduleDoneCollapse(ex);return;}
 replaceCardKeepingViewport(card,exCardHtml(ex));
}
function scheduleDoneCollapse(ex){cancelDoneCollapse(ex.id);doneCollapseTimers[ex.id]=setTimeout(function(){delete doneCollapseTimers[ex.id];collapseDoneCard(ex);},DONE_COLLAPSE_DELAY);}
function collapseDoneExcept(exid){Object.keys(doneCollapseTimers).forEach(function(id){if(id===exid)return;var other=findEx(id);if(other)collapseDoneCard(other);else cancelDoneCollapse(id);});}
function exCardHtml(ex){

 if(active()&&done&&!expandedDoneExercises[ex.id])return'<div class="ex done excompact" id="card-'+attr(ex.id)+'"><span class="tag '+catColor(ex)+'">'+esc(catLabel(ex))+'</span><span class="excompactname">'+esc(ex.name)+'</span><span class="excompactcheck" aria-label="Erledigt">'+icon("check")+'</span><button class="edmini" data-expand-done="'+attr(ex.id)+'">Öffnen</button></div>';

 h+='<div class="links"><a href="'+ytUrl(ex.q||(ex.name+" Technik"))+'" target="_blank" rel="noopener noreferrer">'+icon("play")+' Video</a>';
 h+=ex.gname?'<span class="g ok" title="In Garmin Connect: '+esc(ex.gname)+'">Garmin: '+esc(ex.gname)+'</span>':(ex.proxy?'<span class="g proxy" title="Proxy: '+esc(ex.proxy)+'">Garmin-Proxy: '+esc(ex.proxy)+'</span>':'');
 h+='</div></div><div class="exdoneactions"><button class="edmini" data-collapse-done="'+attr(ex.id)+'"'+(active()&&done?'':' hidden')+'>Einklappen</button><div class="chk'+(done?" done":"")+'" id="chk-'+ex.id+'">'+icon("check")+'</div></div></div>';
 h+='<div class="presc"><span><b>'+sets.length+'</b> Sätze</span><span class="dot">·</span>';

 if(ex.w)h+='<span class="dot">·</span><span>Ziel <b id="tgt-'+ex.id+'">'+(tw>0?tw+" kg":(ex.bw?"Körpergew.":"—"))+'</b></span>';
 h+='<span class="dot">·</span><span>Pause '+restLabel(catRest(ex))+'</span></div>';

 if(last){var v=last.sets.filter(function(s){return s.reps!=="";}).map(function(s){return(ex.w&&s.weight!==""&&Number(s.weight)>0)?s.reps+"×"+s.weight+" kg":(isTime(ex)?fmtSeconds(s.reps):""+s.reps);}).join(" · ")||"—";h+='<button class="last" data-hist="'+ex.id+'"><span class="l">'+icon("undo")+' Zuletzt (W'+last.week+'):</span><span class="v">'+v+'</span><span class="histhint">Verlauf '+icon("chevron-right")+'</span></button>';}
 if(ex.w)h+='<div class="wwrow"><span>Arbeitsgewicht:</span><input class="inp" id="ww-'+ex.id+'" inputmode="decimal" aria-label="'+esc(ex.name)+' Arbeitsgewicht in kg" value="'+baseWeight(ex,S.week)+'"'+dis+'><span>kg'+(ex.bw&&tw===0?" (Zusatz)":"")+'</span></div>';
 var firstOpen=firstOpenSet(ex,sets);

 h+='<div class="srows">';for(var i=0;i<sets.length;i++){var rdis;if(active()){rdis=(i>firstOpen)?" disabled":"";}else{rdis=(sets[i].reps!==""||sets[i].weight!=="")?"":" disabled";}h+=setRowHtml(ex,i,sets[i],rr,tw,rdis,firstOpen,canHoldNow);}h+='</div>';
 if(!active()&&hasData)h+='<div class="editnote">'+icon("edit")+' Werte antippen, um sie nachträglich zu ändern.</div>';
 var pauseDisabled=(!restPhase&&canStartRest(ex,sets,firstOpen))?"":" disabled";
 h+='<button class="pausebtn" id="pause-'+esc(ex.id)+'" data-rest="'+catRest(ex)+'" data-rest-ex="'+esc(ex.id)+'"'+pauseDisabled+'>'+icon("timer")+' Pause starten ('+fmtTime(catRest(ex))+')</button>';
 h+='<div id="rec-'+ex.id+'">'+recHtml(ex)+'</div>';
 return h+'</div>';

function renderView(){
 document.body.classList.toggle("training",active());
 var P=PROG(),wk=P.weeks[S.week-1],day=dayByKey(S.day),h="";
 h+='<div class="hdr"><div class="topright"><button class="linkbtn" id="libbtn">Programme</button><button class="linkbtn" id="pdf">Auswertung</button></div><h1 class="ptitle">'+esc(P.name)+'</h1><p class="sub">'+P.days.length+' Tage · '+P.weeks.length+' Wochen</p></div>';
 if(active()){
  h+='<div class="panel sessionlock"><div class="eyebrow">Laufendes Training</div><div class="week">Woche '+wk.n+'<span class="muted"> / '+P.weeks.length+'</span></div><div class="trainingday">'+esc(day.wd||day.key)+(day.title?' · '+esc(day.title):'')+'</div></div>';

 for(var w=1;w<=(program.weeks||[]).length;w++){var week=program.weeks[w-1],weekHtml="";(program.days||[]).forEach(function(day){var rows="";(day.ex||[]).forEach(function(ex){var cell=S.logs[w+"|"+day.key+"|"+ex.id];if(!cell||!Array.isArray(cell.sets))return;var need=setsForExercise(ex,w),parts=[],volume=0;for(var i=0;i<need;i++){var set=cell.sets[i];if(!reportSetHasData(set))continue;var reps=reportFinite(set.reps),weight=reportFinite(set.weight);if(ex.w&&weight!=null&&weight>0){parts.push(reportNumber(reps,1)+"×"+reportNumber(weight,1));volume+=reps*weight;}else parts.push(ex.unit==="seconds"?fmtSeconds(reps):reportNumber(reps,1));}if(parts.length)rows+='<tr><td class="exn">'+esc(ex.name)+'</td><td>'+esc(parts.join(" · "))+'</td><td class="vol">'+(ex.w&&volume>0?reportNumber(volume,0)+" kg":"–")+'</td></tr>';});if(rows){var session=S.history.filter(function(entry){return entry.week===w&&entry.day===day.key;})[0],sessionText=session?" · "+dDate(session.start)+" · "+reportDuration(session.dur):"";weekHtml+='<div class="rd3">'+esc(day.wd||day.key)+(day.title?" – "+esc(day.title):"")+sessionText+'</div><table class="rtbl"><thead><tr><th>Übung</th><th>Sätze</th><th>Volumen</th></tr></thead><tbody>'+rows+'</tbody></table>';}});if(weekHtml){any=true;out+='<div class="rwk">Woche '+w+' · '+esc(week.label||"")+'</div>'+weekHtml;}}
 return any?out:'<div class="rempty"><strong>Noch kein Trainingsprotokoll</strong>Sobald du Satzwerte einträgst, erscheint hier die vollständige Übersicht.</div>';

 b+='<details class="rdetails"><summary>Vollständiges Trainingsprotokoll <span class="rmeta" style="margin:0">wird nur mitgedruckt, wenn geöffnet</span></summary><div class="rdetailsbody">'+reportDetailedProtocol(program)+'</div></details><p class="rfootnote"><b>Hinweis zum geschätzten 1RM:</b> Satzkraft verwendet die Epley-Formel als verständlichen Vergleichswert und begrenzt die Berechnung auf höchstens 30 Wiederholungen. Der Wert ist eine Schätzung, kein Maximaltest. Körpergewichtsübungen ohne eingetragenes Zusatzgewicht werden nicht als bewegtes Trainingsgewicht berechnet. Deload-Wochen fließen nicht in den Übungstrend ein.</p></div>';
 document.getElementById("report").innerHTML=b;
}

 for(var k in ext.categories){var c=ext.categories[k]||{};cats[k]={label:c.label||k,color:(CAT_COLORS.indexOf(c.color)>=0?c.color:"slate"),rest:(c.rest!=null?c.rest:90),reps:c.reps||null};}
 return{
  id:genId(),name:String(ext.name||"Importiertes Programm").trim(),description:String(ext.description||"").trim(),
  settings:(ext.settings&&typeof ext.settings==="object"&&!Array.isArray(ext.settings))?ext.settings:undefined,
  categories:cats,
  weeks:ext.weeks.map(function(w){return{n:w.n,phase:w.phase,label:w.label||w.phase,rir:String(w.rir==null?"":w.rir),note:w.note||"",sets:w.sets||{}};}),
  days:ext.days.map(function(d){return{key:String(d.key),wd:d.weekday||d.key,title:d.title||"",wu:wucdSan(d.warmup),cd:wucdSan(d.cooldown),ex:d.exercises.map(function(e,i){return{id:String(d.key)+"_"+i,name:e.name,en:e.en||"",sub:e.cue||"",cat:e.category,target:e.target||"",q:e.video||(e.name+" Technik"),gname:(e.garmin!==undefined?e.garmin:null),proxy:e.proxy||null,w:!!e.weighted,inc:e.increment||2.5,def:(e.startWeight!=null?e.startWeight:0),bw:!!e.bodyweight,unit:((e.unit==="seconds"||e.unit==="time")?"seconds":"reps"),sets:(e.sets!=null?e.sets:undefined),reps:(Array.isArray(e.reps)?e.reps:undefined),pmode:((typeof e.progressionMode==="string"&&VALID_PROGRESSION_MODES.indexOf(e.progressionMode)>=0)?e.progressionMode:undefined),tmode:((e.timerMode==="target"||e.timerMode==="max")?e.timerMode:undefined)};})};})
 };
}

  weeks:p.weeks.map(function(w){return{n:w.n,phase:w.phase,label:w.label,rir:w.rir,sets:w.sets,note:w.note};}),
  days:p.days.map(function(d){var dd={key:d.key,weekday:d.wd,title:d.title,exercises:d.ex.map(function(e){var o={name:e.name,category:e.cat};if(e.en)o.en=e.en;if(e.sub)o.cue=e.sub;if(e.w){o.weighted=true;o.increment=e.inc;o.startWeight=e.def;if(e.bw)o.bodyweight=true;}else if(e.unit==="seconds")o.unit="seconds";if(e.tmode)o.timerMode=e.tmode;if(e.sets!=null)o.sets=e.sets;if(Array.isArray(e.reps))o.reps=e.reps;if(e.pmode)o.progressionMode=e.pmode;if(e.q)o.video=e.q;if(e.gname!==undefined&&e.gname!==null)o.garmin=e.gname;if(e.proxy)o.proxy=e.proxy;if(e.target)o.target=e.target;return o;})};if(d.wu&&d.wu.length)dd.warmup=d.wu.map(function(w){return{name:w.name,seconds:w.sec};});if(d.cd&&d.cd.length)dd.cooldown=d.cd.map(function(w){return{name:w.name,seconds:w.sec};});return dd;})
 };
 if(p.description)out.description=p.description;

function plainObject(v){return !!v&&typeof v==="object"&&!Array.isArray(v);}
function finiteNumber(v,min,max,integer){return typeof v==="number"&&isFinite(v)&&v>=min&&v<=max&&(!integer||Math.floor(v)===v);}
function validTimedBlock(arr,label,dayKey){
 if(arr==null)return null;
 if(!Array.isArray(arr))return'Tag '+esc(dayKey)+': "'+label+'" muss eine Liste sein.';
 if(arr.length>8)return'Tag '+esc(dayKey)+': "'+label+'" darf höchstens 8 Einträge enthalten.';
 for(var i=0;i<arr.length;i++){
  var it=arr[i];
  if(!plainObject(it)||typeof it.name!=="string"||!WUCD_SET[it.name])return'Tag '+esc(dayKey)+': "'+label+'" enthält bei Eintrag '+(i+1)+' eine unbekannte Übung.';
  if(!finiteNumber(it.seconds,15,180,true))return'Tag '+esc(dayKey)+': "'+label+'" Eintrag '+(i+1)+' braucht ganze Sekunden zwischen 15 und 180.';
 }
 return null;
}
function parseProgram(text){
 var ext;try{ext=JSON.parse(text);}catch(e){return{err:"Kein gültiges JSON: "+e.message};}
 if(!ext||ext.format!=="trainings-block")return{err:'Feld "format":"trainings-block" fehlt.'};
 if(ext.version!=null&&ext.version!==2)return{err:'Nicht unterstützte Programmversion „'+esc(ext.version)+'“. Erwartet wird Version 2.'};
 if(typeof ext.name!=="string"||!ext.name.trim())return{err:'"name" fehlt oder ist leer.'};
 if(ext.name.trim().length>LIMITS.maxNameLen)return{err:'Programmname zu lang ('+ext.name.trim().length+' Zeichen). Maximal '+LIMITS.maxNameLen+' Zeichen.'};
 if(ext.description!=null&&(typeof ext.description!=="string"||ext.description.length>200))return{err:'"description" muss Text mit höchstens 200 Zeichen sein.'};
 if(!plainObject(ext.categories)||!Object.keys(ext.categories).length)return{err:'"categories" fehlt oder ist leer.'};
 var categoryKeys=Object.keys(ext.categories);
 if(categoryKeys.length>20)return{err:'Zu viele Kategorien ('+categoryKeys.length+'). Maximal 20.'};
 for(var ci=0;ci<categoryKeys.length;ci++){
  var categoryKey=categoryKeys[ci],category=ext.categories[categoryKey];
  if(!/^[A-Za-z0-9_-]{1,32}$/.test(categoryKey)||categoryKey==="__proto__"||categoryKey==="constructor"||categoryKey==="prototype")return{err:'Ungültiger Kategorie-Schlüssel „'+esc(categoryKey)+'“. Erlaubt sind Buchstaben, Zahlen, _ und -.'};
  if(!plainObject(category))return{err:'Kategorie „'+esc(categoryKey)+'“ muss ein Objekt sein.'};
  if(typeof category.label!=="string"||!category.label.trim()||category.label.length>30)return{err:'Kategorie „'+esc(categoryKey)+'“ braucht ein Label mit höchstens 30 Zeichen.'};
  if(CAT_COLORS.indexOf(category.color)<0)return{err:'Kategorie „'+esc(categoryKey)+'“ hat eine ungültige Farbe.'};
  if(!finiteNumber(category.rest,15,600,true))return{err:'Kategorie „'+esc(categoryKey)+'“ braucht eine Pause zwischen 15 und 600 Sekunden.'};
  if(category.reps!=null){
   if(!plainObject(category.reps))return{err:'Kategorie „'+esc(categoryKey)+'": "reps" muss ein Objekt sein.'};
   var repPhases=Object.keys(category.reps);
   for(var rp=0;rp<repPhases.length;rp++){
    var repPhase=repPhases[rp],range=category.reps[repPhase];
    if(["aufbau","intensiv","deload"].indexOf(repPhase)<0)return{err:'Kategorie „'+esc(categoryKey)+'“ enthält den unbekannten Wiederholungsbereich „'+esc(repPhase)+'“.'};
    if(!Array.isArray(range)||range.length!==2||!finiteNumber(range[0],1,100,true)||!finiteNumber(range[1],1,100,true)||range[0]>range[1])return{err:'Kategorie „'+esc(categoryKey)+'“, Phase „'+esc(repPhase)+'": Wiederholungen müssen als [min,max] zwischen 1 und 100 angegeben sein.'};
   }
  }
 }
 if(!Array.isArray(ext.weeks)||!ext.weeks.length)return{err:'"weeks" fehlt oder ist leer.'};
 if(!Array.isArray(ext.days)||!ext.days.length)return{err:'"days" fehlt oder ist leer.'};
 if(ext.weeks.length>LIMITS.maxWeeks)return{err:'Zu viele Wochen ('+ext.weeks.length+'). Ein Trainingsblock hat höchstens '+LIMITS.maxWeeks+' Wochen – teile längere Pläne in mehrere Programme.'};
 if(ext.days.length>LIMITS.maxDays)return{err:'Zu viele Trainingstage ('+ext.days.length+'). Maximal '+LIMITS.maxDays+' pro Woche (eine Woche hat 7 Tage).'};
 var settings=ext.settings;
 if(settings!=null){
  if(!plainObject(settings))return{err:'"settings" muss ein Objekt sein.'};

function coachCall(){

 .then(function(r){if(r.status===429)return{ok:false,d:{error:"Zu viele KI-Anfragen. Bitte warte etwa drei Minuten und versuche es erneut."}};return r.json().then(function(d){return{ok:r.ok,d:d};}).catch(function(){return{ok:false,d:{error:"Ung\u00fcltige Antwort vom Server"}};});})
 .then(function(res){
  if(!res.ok||res.d.error){coachBusy=false;coachErr="Fehler: "+(res.d.error||"Server nicht erreichbar");renderCoach();return;}
  var text=res.d.text||"",prog=extractProgram(text);
  var chk=prog?parseProgram(prog):{err:"Kein g\u00fcltiges JSON in der Antwort."};
  if(chk.err){
   if(!coachRetried){
    coachRetried=true;
    coachMsgs.push({role:"assistant",content:text});
    coachMsgs.push({role:"user",content:"Das JSON war ung\u00fcltig: "+chk.err+" Sende jetzt NUR das vollst\u00e4ndige korrigierte JSON."});
    coachCall();return;
   }
   coachBusy=false;coachErr="Die KI hat kein g\u00fcltiges Programm geliefert ("+chk.err+"). Neu starten und erneut versuchen.";renderCoach();return;
  }
  var vg=vagueExercises(chk.prog);
  if(vg.length&&!coachVagueRetried){
   coachVagueRetried=true;
   coachMsgs.push({role:"assistant",content:text});
   coachMsgs.push({role:"user",content:"Diese Übungsnamen sind nicht eindeutig: "+vg.join(", ")+". Ersetze sie durch konkrete, eindeutig ausführbare Übungen mit Equipment-Angabe (keine Wörter wie Ersatz/Alternative/oder). Sende NUR das vollständige korrigierte JSON."});
   coachCall();return;
  }
  coachMsgs.push({role:"assistant",content:prog});
  var dsc="";try{dsc=String(JSON.parse(prog).description||"");}catch(e){}
  coachBusy=false;coachProgram=prog;coachProgObj=chk.prog;coachDesc=dsc.slice(0,200);coachErr=null;renderCoach();
 })
 .catch(function(){coachBusy=false;coachErr="Netzwerkfehler. Ist die Function mit deployed (Ordner netlify/functions)?";renderCoach();});
}

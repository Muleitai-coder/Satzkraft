<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Trainings-Block</title>
<link rel="manifest" href="manifest.json">
<script>
(function(){
 try{
  var saved=localStorage.getItem("training-theme-v1");
  document.documentElement.dataset.theme=saved||(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");
 }catch(e){document.documentElement.dataset.theme="dark";}
})();
</script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{color-scheme:dark}
html[data-theme="light"]{color-scheme:light}
body{margin:0;background:#0a0d12;color:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.wrap{max-width:560px;margin:0 auto;padding:max(20px,env(safe-area-inset-top)) 16px 130px}
.hdr{margin-bottom:16px}
.ptitle{font-size:21px;font-weight:700;margin:0;letter-spacing:-.01em;line-height:1.25}
.iconbtn{background:none;border:none;color:#71717a;font-size:18px;padding:6px;border-radius:8px;cursor:pointer}
.iconbtn:active{background:#141920}
.sub{font-size:12px;color:#71717a;margin:6px 0 0}
.topright{display:flex;gap:2px;justify-content:flex-end;margin-bottom:8px}
.linkbtn{background:none;border:none;color:#71717a;font-size:12px;font-weight:600;cursor:pointer;padding:5px 7px;border-radius:8px;white-space:nowrap}
.linkbtn:active{background:#141920;color:#a1a1aa}
.themebtn{display:inline-flex;align-items:center;gap:4px}
.panel{background:#141920;border:1px solid #242b35;border-radius:16px;padding:16px;margin-bottom:16px}
.wknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.nav{width:38px;height:38px;border:none;border-radius:12px;background:#242b35;color:#fafafa;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav:disabled{opacity:.3}
.wknum{text-align:center}
.wknum .lbl{font-size:12px;color:#71717a}
.wknum .big{font-size:26px;font-weight:700;line-height:1}
.wknum .big span{color:#71717a;font-size:16px}
.bars{display:flex;align-items:flex-end;gap:6px;height:40px;margin-bottom:4px}
.bar{flex:1;height:100%;border-radius:6px;position:relative;overflow:hidden;border:1px solid #242b35;background:rgba(36,43,53,.6);cursor:pointer;padding:0}
.bar.deload{background:rgba(8,47,73,.4)}
.bar.cur{border-color:#34d399}
.bar .fill{position:absolute;left:0;right:0;bottom:0;background:#10b981;transition:height .25s}
.bar .fill.full{background:#34d399}
.wknums{display:flex;gap:6px;margin-bottom:12px}
.wknums div{flex:1;text-align:center;font-size:9px;color:#71717a}
.wknums div.cur{color:#34d399;font-weight:700}
.badge{font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid}
.badge.norm{background:rgba(16,185,129,.15);color:#6ee7b7;border-color:rgba(16,185,129,.3)}
.badge.deload{background:rgba(14,165,233,.15);color:#7dd3fc;border-color:rgba(14,165,233,.3)}
.rir{font-size:12px;color:#a1a1aa;margin-left:8px}
.note{font-size:12px;color:#a1a1aa;margin:8px 0 0;line-height:1.5}
.sessionlock{text-align:center;padding:18px 16px}
.sessionlock .eyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#34d399;margin-bottom:7px}
.sessionlock .week{font-size:24px;font-weight:750;line-height:1.1}
.sessionlock .trainingday{font-size:14px;font-weight:600;color:#d4d4d8;margin-top:8px}
.workoutpanel{display:flex;align-items:center;justify-content:space-between;gap:14px;border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.07)}
.runlabel{font-size:12px;font-weight:700;color:#6ee7b7;margin-bottom:3px}
.runlabel.paused{color:#fcd34d}
.runtime{font-size:25px;font-weight:750;font-variant-numeric:tabular-nums;line-height:1}
.runactions{display:flex;gap:7px;flex-shrink:0}
.runactions .bbtn{padding:9px 11px}
.wstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.wday{padding:9px 2px;border-radius:10px;border:1px solid #242b35;background:#141920;min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.wday.rest{opacity:.4;border-style:dashed}
.wday.train{cursor:pointer;border-color:#313a46}
.wday.train:active{background:#242b35}
.wday.active{background:#10b981;border-color:#10b981}
.wdn{font-size:12px;font-weight:700;color:#d4d4d8;line-height:1}
.wday.rest .wdn{font-weight:600;color:#71717a}
.wday.active .wdn{color:#0a0d12}
.wstat{font-size:11px;font-weight:700;color:#71717a;line-height:1;min-height:11px}
.wday.done .wstat{color:#34d399}
.wday.active .wstat{color:#064e3b}
.dayhdr{display:flex;align-items:center;justify-content:space-between;margin:0 4px 12px}
.dayhdr.active{justify-content:flex-end}
.dayhdr h2{font-size:14px;font-weight:600;color:#d4d4d8;margin:0}
.dayhdr .p{font-size:12px;color:#71717a}
.sessbox{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);color:#9ca3af;border-radius:10px;padding:8px 12px;font-size:12px;margin-bottom:8px}
.starthint{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;border-radius:12px;padding:14px;font-size:13px;margin-bottom:14px;text-align:center;line-height:1.5}
.ex{background:#141920;border:1px solid #242b35;border-radius:16px;padding:16px;margin-bottom:12px}
.ex.done{border-color:rgba(16,185,129,.5)}
.ex.rest-focus{border-color:#34d399;box-shadow:0 0 0 1px rgba(52,211,153,.25),0 20px 55px rgba(0,0,0,.5)}
body.rest-lock .ex{transition:opacity .2s,filter .2s,transform .2s}
body.rest-lock .ex:not(.rest-focus){opacity:.14;filter:saturate(.25) blur(.3px);transform:scale(.985)}
.ex.locked{opacity:.7}
.exhead{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}
.exhead .info{min-width:0}
.tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:6px;border:1px solid;display:inline-block}
.tag.violet{background:rgba(139,92,246,.15);color:#c4b5fd;border-color:rgba(139,92,246,.3)}
.tag.amber{background:rgba(245,158,11,.15);color:#fcd34d;border-color:rgba(245,158,11,.3)}
.tag.emerald{background:rgba(16,185,129,.15);color:#6ee7b7;border-color:rgba(16,185,129,.3)}
.tag.sky{background:rgba(14,165,233,.15);color:#7dd3fc;border-color:rgba(14,165,233,.3)}
.tag.orange{background:rgba(249,115,22,.15);color:#fdba74;border-color:rgba(249,115,22,.3)}
.tag.rose{background:rgba(244,63,94,.15);color:#fda4af;border-color:rgba(244,63,94,.3)}
.tag.slate{background:rgba(100,116,139,.15);color:#cbd5e1;border-color:rgba(100,116,139,.3)}
.exname{font-size:14px;font-weight:600;margin:4px 0 0;line-height:1.2}
.exen{font-size:12px;color:#71717a;font-style:italic;margin:0}
.exsub{font-size:12px;color:#71717a;margin:2px 0 0}
.links{display:flex;flex-wrap:wrap;align-items:center;gap:4px 12px;margin-top:6px}
.links a,.links .g{font-size:11px;color:#71717a;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.links a:active{color:#34d399}
.g.ok{color:rgba(16,185,129,.85)}
.g.proxy{color:rgba(245,158,11,.85)}
.chk{width:32px;height:32px;border-radius:999px;border:2px solid #313a46;color:#313a46;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.chk.done{background:#10b981;border-color:#10b981;color:#0a0d12}
.presc{display:flex;flex-wrap:wrap;align-items:center;gap:4px 10px;font-size:12px;color:#a1a1aa;background:rgba(10,13,18,.5);border-radius:8px;padding:8px 10px;margin-bottom:8px}
.presc b{color:#e4e4e7}
.presc .dot{color:#313a46}
.last{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:12px;min-width:0;width:100%;background:none;border:none;text-align:left;padding:4px 0;cursor:pointer;font-family:inherit}
.last:active{opacity:.6}
.last .l{color:#71717a;flex-shrink:0}
.last .v{color:#a1a1aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.last .histhint{margin-left:auto;color:#71717a;flex-shrink:0;font-weight:600}
.wwrow{display:flex;align-items:center;gap:8px;font-size:12px;color:#71717a;margin-bottom:12px}
.wwrow input{width:64px}
.inp{background:#242b35;border:1px solid #313a46;border-radius:8px;padding:6px;color:#fafafa;text-align:center;font-size:16px;outline:none;min-width:0}
.inp:focus{border-color:#10b981}
.inp:disabled{opacity:.4}
.srows{display:flex;flex-direction:column;gap:6px}
.srow{display:flex;align-items:center;gap:6px;border:1px solid transparent;border-radius:8px;padding:4px 6px}
.srow.full{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4)}
.srow .slbl{font-size:11px;color:#71717a;width:24px;flex-shrink:0}
.srow .inp{flex:1}
.srow .unit{font-size:11px;color:#71717a;flex-shrink:0}
.editnote{font-size:11px;color:#71717a;margin-top:8px;text-align:center}
.pausebtn{margin-top:10px;width:100%;background:#242b35;border:1px solid #313a46;color:#d4d4d8;border-radius:10px;padding:8px;font-size:12px;font-weight:600;cursor:pointer}
.pausebtn:active{background:#313a46}
.pausebtn:disabled{opacity:.4}
.rec{margin-top:12px;border:1px solid;border-radius:12px;padding:8px 12px;font-size:12px;font-weight:500;display:flex;gap:8px;align-items:flex-start;line-height:1.45}
.rec.emerald{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.rec.amber{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:#fcd34d}
.rec.sky{background:rgba(14,165,233,.15);border-color:rgba(14,165,233,.4);color:#7dd3fc}
.rec.orange{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.4);color:#fdba74}
.legend{margin-top:24px;background:rgba(20,25,32,.5);border:1px solid rgba(36,43,53,.5);border-radius:12px;padding:12px;font-size:12px;color:#71717a;line-height:1.55}
.legend b{color:#a1a1aa}
#bar{position:fixed;left:0;right:0;bottom:0;background:rgba(10,13,18,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1px solid #242b35;padding:10px 16px calc(10px + env(safe-area-inset-bottom));z-index:40}
#bar.is-hidden{display:none}
.barwrap{max-width:528px;margin:0 auto;display:flex;flex-wrap:wrap;gap:8px 10px;align-items:center}
.start-only{width:100%;display:flex;justify-content:center}
.start-only .bbtn{width:100%;padding:12px}
.restbar{position:relative;overflow:hidden;width:100%;min-height:56px;border:1px solid rgba(16,185,129,.5);border-radius:14px;background:#141920}
.restfill{position:absolute;inset:0 auto 0 0;width:100%;background:linear-gradient(90deg,rgba(16,185,129,.38),rgba(16,185,129,.16));transition:width .25s linear}
.restbar.ready{border-color:rgba(52,211,153,.75)}
.restbar.ready .restfill{background:rgba(16,185,129,.22)}
.restbar.setmode{border-color:rgba(14,165,233,.55)}
.restbar.setmode .restfill{background:rgba(14,165,233,.14)}
.restcontent{position:relative;z-index:1;min-height:56px;display:flex;align-items:center;gap:8px;padding:8px 9px}
.restname{min-width:0;flex:1}
.restname .main{font-size:12px;font-weight:700;color:#d1fae5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.restname .subline{font-size:10px;color:#6ee7b7;margin-top:2px}
.restcontent .tbig{min-width:46px;text-align:center}
.nextpause{background:#10b981;color:#0a0d12}
.bar-hidden .wrap{padding-bottom:40px}
body.rest-lock{position:fixed;left:0;right:0;width:100%;overflow:hidden}
.wt,.rt{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.rt{justify-content:flex-end}
.tbig{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.rt.run .tbig{color:#6ee7b7}
.tlbl{font-size:11px;color:#71717a}
.bbtn{border:none;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;background:#242b35;color:#fafafa;white-space:nowrap}
.bbtn.go{background:#10b981;color:#0a0d12}
.bbtn.pause{background:#242b35;color:#fcd34d}
.bbtn.stop{background:#3f1d1d;color:#fca5a5}
.bbtn.mini{padding:7px 9px;font-size:12px}
.muted{font-size:11px;color:#71717a}
@media(max-width:430px){
 .workoutpanel{align-items:flex-start;flex-direction:column}
 .runactions{width:100%}
 .runactions .bbtn{flex:1}
 .restcontent{gap:5px;padding:7px}
 .restcontent .bbtn.mini{padding:7px}
}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:95;display:none;align-items:center;justify-content:center;padding:24px}
.mbox{background:#141920;border:1px solid #242b35;border-radius:16px;padding:20px;max-width:360px;width:100%;max-height:84vh;overflow-y:auto}
#wucd{display:none;position:fixed;inset:0;z-index:70;background:#0a0d12;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:12px}
#wucd.open{display:flex}
#wucd .wuk{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#71717a;font-weight:700}
#wucd .wup{font-size:13px;color:#71717a}
#wucd .wun{font-size:26px;font-weight:800;line-height:1.25;max-width:340px}
#wucd .wut{font-size:72px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
#wucd .wunext{font-size:13px;color:#71717a;min-height:18px}
#wucd .wurow{display:flex;gap:10px;margin-top:8px}
html[data-theme="light"] #wucd{background:#f4f4f5}
.htbl{width:100%;border-collapse:collapse;margin-bottom:4px}
.htbl th,.htbl td{border-bottom:1px solid #242b35;padding:7px 6px;font-size:12px;text-align:left;color:#e4e4e7;vertical-align:top}
.htbl th{color:#71717a;font-weight:600;font-size:11px}
.htbl td.wk{white-space:nowrap;color:#a1a1aa}
.htbl td.wk .hwl{display:block;font-size:10px;color:#71717a}
.htbl td.vol{white-space:nowrap;color:#71717a;text-align:right}
.htbl tr.cur td{color:#6ee7b7}
.mtitle{font-size:16px;font-weight:700;margin-bottom:8px}
.mmsg{font-size:13px;color:#a1a1aa;line-height:1.5;margin-bottom:16px}
.mbtns{display:flex;flex-direction:column;gap:8px}
.mbtn{border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;background:#242b35;color:#fafafa}
.mbtn.primary{background:#10b981;color:#0a0d12}
.mbtn.danger{background:#3f1d1d;color:#fca5a5}
.histbtn{background:#10b981;color:#0a0d12;border:none;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer}
.overlay{position:fixed;inset:0;background:#0a0d12;z-index:60;overflow-y:auto;display:none}
.overlay.open{display:block}
#lib{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:85;display:none;align-items:flex-start;justify-content:center;padding:max(20px,env(safe-area-inset-top)) 14px calc(20px + env(safe-area-inset-bottom));overflow-y:auto}
#lib.open{display:flex}
.libbox{background:#141920;border:1px solid #242b35;border-radius:16px;width:100%;max-width:480px;margin:auto;padding:18px}
.owrap{max-width:560px;margin:0 auto;padding:max(20px,env(safe-area-inset-top)) 16px 40px}
.ohdr{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ohdr h1{font-size:18px;margin:0;flex:1;font-weight:700}
.rmeta{color:#71717a;font-size:12px;margin:0 0 12px}
.rwk{font-size:15px;font-weight:700;background:#141920;border:1px solid #242b35;border-radius:8px;padding:7px 10px;margin:18px 0 8px}
.rsec{font-size:15px;font-weight:700;margin:18px 0 8px;border-bottom:1px solid #242b35;padding-bottom:4px}
.rd3{font-size:13px;font-weight:600;color:#d4d4d8;margin:12px 0 4px}
.rtbl{width:100%;border-collapse:collapse;margin-bottom:8px}
.rtbl th,.rtbl td{border:1px solid #242b35;padding:5px 7px;font-size:12px;text-align:left;color:#e4e4e7;vertical-align:top}
.rtbl th{background:#141920;color:#a1a1aa;font-weight:600}
.rtbl .exn{font-weight:600;width:38%}
.rtbl .vol{width:18%;color:#a1a1aa}
.progitem{background:#141920;border:1px solid #242b35;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.progitem.active{border-color:rgba(16,185,129,.5)}
.progitem .meta{flex:1;min-width:0}
.progitem .pn{font-size:14px;font-weight:600}
.progitem .pm{font-size:11px;color:#71717a}
.smallbtn{background:#242b35;color:#fafafa;border:none;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.linklike{background:none;border:none;color:#34d399;font:inherit;font-weight:600;cursor:pointer;padding:0;text-decoration:underline}
.smallbtn.go{background:#10b981;color:#0a0d12}
.smallbtn.del{background:#3f1d1d;color:#fca5a5}
.libsec{font-size:13px;font-weight:700;color:#d4d4d8;margin:22px 0 8px}
.libta{width:100%;min-height:120px;background:#141920;border:1px solid #242b35;border-radius:10px;color:#e4e4e7;font-family:ui-monospace,Menlo,monospace;font-size:12px;padding:10px;outline:none}
.libta:focus{border-color:#10b981}
.librow{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.libnote{font-size:11px;color:#71717a;line-height:1.5;margin-top:8px}
:focus-visible{outline:2px solid #34d399;outline-offset:2px}
.inp:focus-visible,.libta:focus-visible{outline:none}
@media(hover:hover){
.bbtn:hover,.mbtn:hover,.smallbtn:hover,.histbtn:hover,.nav:hover:not(:disabled),.pausebtn:hover:not(:disabled){filter:brightness(1.12)}
.linkbtn:hover,.iconbtn:hover{color:#a1a1aa}
.wday.train:hover{border-color:#71717a}
.bar:hover{border-color:#313a46}
}
/* ===== Beta: Design-Refresh ===== */
.bbtn.go,.mbtn.primary,.smallbtn.go,.histbtn,.nextpause{background:linear-gradient(135deg,#10b981,#0d9488)}
.wday.active{background:linear-gradient(160deg,#10b981,#0d9488);border-color:#10b981}
.panel,.ex{box-shadow:0 1px 0 rgba(255,255,255,.03) inset}
.inp{padding:10px 6px;min-height:44px}
.bbtn,.mbtn,.smallbtn,.pausebtn,.stp{min-height:44px}
.nav{width:44px;height:44px}
.chk{width:36px;height:36px}
.srow{gap:4px}
.srow .slbl{width:20px}
.stp{width:38px;border:1px solid #313a46;background:#242b35;color:#fafafa;border-radius:10px;font-size:19px;font-weight:700;cursor:pointer;flex-shrink:0;padding:0}
.stp:active{background:#313a46}
.stp:disabled{opacity:.25}
.restbar{min-height:92px}
.restcontent{min-height:92px}
.restcontent .tbig{font-size:40px;min-width:112px;line-height:1}
@media(max-width:430px){.restcontent .tbig{font-size:32px;min-width:88px}.stp{width:34px}}
.chatlog{display:flex;flex-direction:column;gap:8px;max-height:46vh;overflow-y:auto;margin-bottom:10px}
.cmsg{border-radius:12px;padding:9px 12px;font-size:13px;line-height:1.5;max-width:88%;white-space:pre-wrap;word-break:break-word}
.cmsg.user{align-self:flex-end;background:#10b981;color:#052e16}
.cmsg.ai{align-self:flex-start;background:#242b35;color:#e4e4e7}
.cmsg.err{align-self:flex-start;background:#3f1d1d;color:#fca5a5}
.optbtn{display:block;width:100%;text-align:left;background:#242b35;border:1px solid #313a46;color:#fafafa;border-radius:12px;padding:13px 14px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;min-height:48px}
.optbtn:active{background:#313a46}
.optbtn.sel{border-color:#10b981;background:rgba(16,185,129,.15);color:#6ee7b7}
.optgrid{display:grid;gap:6px}

   {id:"c3",name:"Rumänisches Kreuzheben",en:"Romanian Deadlift",sub:"Hüfte zurück, Hamstrings spüren",cat:"strength",w:true,inc:5,def:80,q:"Rumänisches Kreuzheben Technik",gname:"Romanian Deadlift"},
   {id:"c4",name:"Dips (Trizeps)",en:"Triceps Dip",sub:"Aufrecht, Ellbogen eng",cat:"hyp",w:true,inc:2.5,def:0,bw:true,q:"Dips Technik Trizeps",gname:"Triceps Dip"},
   {id:"c5",name:"Klimmzüge (Untergriff)",en:"Chin-Up",sub:"Bizeps-betont, voller ROM",cat:"hyp",w:true,inc:2.5,def:0,bw:true,q:"Klimmzüge Untergriff Chin up Technik",gname:"Chin-Up"},
   {id:"c6",name:"Kettlebell Swings",en:"Kettlebell Swing",sub:"Hüft-Explosivität, Hardstyle",cat:"hyp",w:true,inc:4,def:24,q:"Kettlebell Swing Technik Hardstyle",gname:"Kettlebell Swing"},

var KEY="cali-plan-v3";
var THEME_KEY="training-theme-v1";
function currentTheme(){return document.documentElement.dataset.theme==="light"?"light":"dark";}
function themeButtonHtml(){
 var light=currentTheme()==="light";
 return '<button class="linkbtn themebtn" id="themebtn" aria-label="'+(light?"Dunkelmodus":"Hellmodus")+'" title="'+(light?"Dunkelmodus einschalten":"Hellmodus einschalten")+'">'+(light?"☾ Dunkel":"☀ Hell")+'</button>';
}
function applyTheme(theme,persist){
 theme=theme==="light"?"light":"dark";
 document.documentElement.dataset.theme=theme;
 var meta=document.querySelector('meta[name="theme-color"]');
 if(meta)meta.content=theme==="light"?"#f4f4f5":"#0a0d12";
 if(persist){try{localStorage.setItem(THEME_KEY,theme);}catch(e){}}
 var btn=document.getElementById("themebtn");
 if(btn){
  var light=theme==="light";
  btn.innerHTML=light?"☾ Dunkel":"☀ Hell";
  btn.setAttribute("aria-label",light?"Dunkelmodus":"Hellmodus");
  btn.title=light?"Dunkelmodus einschalten":"Hellmodus einschalten";
 }
}
function toggleTheme(){applyTheme(currentTheme()==="light"?"dark":"light",true);}
applyTheme(currentTheme(),false);
function clone(o){return JSON.parse(JSON.stringify(o));}
function round(x){return Math.round(x*2)/2;}
function sanInt(v){return v.replace(/[^0-9]/g,"");}
function sanDec(v){return v.replace(",",".").replace(/[^0-9.]/g,"").replace(/(\..*)\./g,"$1");}
function fmtTime(s){s=Math.max(0,Math.round(s));var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;function p(n){return n<10?"0"+n:""+n;}return h>0?h+":"+p(m)+":"+p(ss):m+":"+p(ss);}
function dDate(ts){return new Date(ts).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit",year:"numeric"});}
function dClock(ts){return new Date(ts).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ---------- State (mehrere Programme) ----------
var S=load();
function newStore(prog){return{tg:{},logs:{},history:[],workout:null,week:1,day:prog.days[0].key};}
function initState(){
 var def=clone(DEFAULT_PROGRAM);
 var st=newStore(def);
 var s={programs:{"default":def},active:"default",store:{"default":st}};
 alias(s);return s;
}
function alias(s){var st=s.store[s.active];s.tg=st.tg;s.logs=st.logs;s.history=st.history;s.workout=st.workout;s.week=st.week;s.day=st.day;}
function load(){
 try{var r=localStorage.getItem(KEY);if(r){var v=JSON.parse(r);return normalize(v);}}catch(e){}
 try{var r2=localStorage.getItem("cali-plan-v2");if(r2){var o=JSON.parse(r2);var s=initState();var st=s.store["default"];st.tg=o.tg||{};st.logs=o.logs||{};st.history=o.history||[];st.workout=o.workout||null;st.week=o.week||1;st.day=o.day||"A";alias(s);return s;}}catch(e){}
 return initState();
}
function migrateProgram(p){
 // Alt-Format (type/repRanges/sStr…) → daten-getriebene Kategorien
 if(p.categories)return p;
 var rr=p.repRanges||{};
 p.categories={
  strength:{label:"Kraft",color:"amber",rest:150,reps:rr.strength||{aufbau:[5,7],intensiv:[3,5],deload:[5,5]}},
  hyp:{label:"Hypertrophie",color:"emerald",rest:90,reps:rr.hyp||{aufbau:[8,12],intensiv:[6,10],deload:[10,10]}},
  skill:{label:"Skill",color:"violet",rest:150,reps:null},
  core:{label:"Core",color:"sky",rest:60,reps:null}
 };
 (p.weeks||[]).forEach(function(w){if(!w.sets){w.sets={strength:w.sStr,hyp:w.sHyp,skill:w.sSkl,core:w.sSkl};}delete w.sStr;delete w.sHyp;delete w.sSkl;});
 (p.days||[]).forEach(function(d){(d.ex||[]).forEach(function(e){if(e.cat===undefined)e.cat=e.type;if(e.unit===undefined)e.unit="reps";delete e.type;});});
 delete p.repRanges;
 return p;
}
function normalize(v){
 if(!v.programs)v.programs={};
 if(!v.programs["default"])v.programs["default"]=clone(DEFAULT_PROGRAM);
 for(var pid in v.programs)migrateProgram(v.programs[pid]);
 if(!v.store)v.store={};
 if(!v.active||!v.programs[v.active])v.active="default";
 var p=v.programs[v.active];
 if(!v.store[v.active])v.store[v.active]=newStore(p);
 var st=v.store[v.active];
 var keys=p.days.map(function(d){return d.key;});
 if(keys.indexOf(st.day)<0)st.day=keys[0];
 if(!st.week||st.week>p.weeks.length)st.week=Math.min(st.week||1,p.weeks.length);if(st.week<1)st.week=1;
 if(st.workout){
  if(!st.workout.week)st.workout.week=st.week;
  if(!st.workout.day)st.workout.day=st.day;
  st.week=st.workout.week;
  if(keys.indexOf(st.workout.day)>=0)st.day=st.workout.day;
 }
 alias(v);return v;
}
function syncStore(){S.store[S.active]={tg:S.tg,logs:S.logs,history:S.history,workout:S.workout,week:S.week,day:S.day};}
function persist(){try{localStorage.setItem(KEY,JSON.stringify({programs:S.programs,active:S.active,store:S.store}));}catch(e){}}
var saveT;function save(){syncStore();clearTimeout(saveT);saveT=setTimeout(persist,400);}
function flushSave(){syncStore();clearTimeout(saveT);saveT=null;persist();}
document.addEventListener("visibilitychange",function(){if(document.visibilityState==="hidden")flushSave();});
window.addEventListener("pagehide",flushSave);

// ---------- Programm-Zugriff ----------
function PROG(){return S.programs[S.active];}
function dayKeys(){return PROG().days.map(function(d){return d.key;});}
function dayByKey(k){var ds=PROG().days;for(var i=0;i<ds.length;i++)if(ds[i].key===k)return ds[i];return ds[0];}
function wdSlot(d){var k=String(d.wd||"").trim().toLowerCase();var idx=WD_MAP[k];if(idx==null)idx=WD_MAP[k.split(/[\s\-\/.,]/)[0]];return(idx==null?null:idx);}
function weekLayout(){
 var slots=[null,null,null,null,null,null,null],pending=[];
 PROG().days.forEach(function(d){var idx=wdSlot(d);if(idx!=null&&slots[idx]==null)slots[idx]=d;else pending.push(d);});
 pending.forEach(function(d){for(var i=0;i<7;i++){if(slots[i]==null){slots[i]=d;break;}}});
 return slots;
}
function dayStatus(d){
 var all=d.ex.length,dn=0;for(var i=0;i<all;i++)if(cellComplete(S.week,d.key,d.ex[i]))dn++;
 return{dn:dn,all:all,complete:all>0&&dn===all};
}
function wfOf(W){return W.phase==="deload"?getWorkoutSettings().deloadMultiplier:1.0;}
function CATS(){return PROG().categories||{};}
function catOf(ex){return CATS()[ex.cat]||{};}
function catLabel(ex){var c=catOf(ex);return c.label||ex.cat||"";}
function catColor(ex){var c=catOf(ex).color;return CAT_COLORS.indexOf(c)>=0?c:"slate";}
function catRest(ex){var r=catOf(ex).rest;return r>0?r:90;}
function restLabel(sec){if(!sec)return "–";if(sec<60)return sec+" s";return sec%60===0?(sec/60)+" min":fmtTime(sec)+" min";}
function isTime(ex){return ex.unit==="seconds";}
function catReps(ex,phase){var r=catOf(ex).reps;return(r&&r[phase])?r[phase]:null;}
function setsForWeek(catKey,w){var W=PROG().weeks[w-1];if(!W)return 0;var s=W.sets&&W.sets[catKey];return(s!=null)?s:3;}

function getSets(ex){var n=setsForWeek(ex.cat,S.week);var cur=S.logs[S.week+"|"+S.day+"|"+ex.id]||{sets:[]};var out=[];for(var i=0;i<n;i++)out.push(cur.sets[i]||{reps:"",weight:""});return out;}
function writeSets(ex,sets){S.logs[S.week+"|"+S.day+"|"+ex.id]={sets:sets};}
function setComplete(ex,s){return ex.w?(s.reps!==""&&s.weight!==""):(s.reps!=="");}
function firstOpenSet(ex,sets){sets=sets||getSets(ex);for(var i=0;i<sets.length;i++)if(!setComplete(ex,sets[i]))return i;return sets.length;}
function cellComplete(w,dk,ex){var need=setsForWeek(ex.cat,w);var c=S.logs[w+"|"+dk+"|"+ex.id];if(!c||!c.sets||!need)return false;var cnt=0;for(var i=0;i<need;i++){var s=c.sets[i];if(s&&setComplete(ex,s))cnt++;}return cnt===need;}
function isDone(ex){return cellComplete(S.week,S.day,ex);}

function actualMinWeight(ex,w){var c=S.logs[w+"|"+S.day+"|"+ex.id],need=setsForWeek(ex.cat,w),m=Infinity;if(!c||!c.sets)return null;for(var i=0;i<need;i++){var s=c.sets[i];if(s&&s.weight!==""){var x=Number(s.weight);if(x<m)m=x;}}return m===Infinity?null:m;}

/* =====================================================================
   COACH / PROGRESSION MODUL  (reine Logik, von der UI getrennt)
   - Workout-JSON liefert nur Daten/Parameter (settings, progressionMode).
   - App-Speicher liefert die Historie (S.logs / S.history).
   - Dieses Modul rechnet daraus die Empfehlung. UI ruft buildCoachMessage().
   ===================================================================== */
// Settings des aktiven Programms mit stabilen Defaults zusammenführen.
function getWorkoutSettings(prog){
 prog=prog||PROG();var raw=(prog&&prog.settings)||{},out={};
 for(var k in DEFAULT_WORKOUT_SETTINGS)out[k]=DEFAULT_WORKOUT_SETTINGS[k];
 if(typeof raw.progressionSystem==="string")out.progressionSystem=raw.progressionSystem;
 if(isFinite(raw.deloadMultiplier)&&raw.deloadMultiplier>0&&raw.deloadMultiplier<=1)out.deloadMultiplier=raw.deloadMultiplier;
 if(typeof raw.requireAllSetsForIncrease==="boolean")out.requireAllSetsForIncrease=raw.requireAllSetsForIncrease;
 if(typeof raw.allowAutoDecrease==="boolean")out.allowAutoDecrease=raw.allowAutoDecrease;
 if(isFinite(raw.postDeloadReturnMultiplier)&&raw.postDeloadReturnMultiplier>0&&raw.postDeloadReturnMultiplier<=1)out.postDeloadReturnMultiplier=raw.postDeloadReturnMultiplier;
 return out;
}
// Progressions-Modus: expliziter (gültiger) Wert, sonst aus Übungsdaten abgeleitet.
function getExerciseProgressionMode(ex){
 var m=ex&&ex.pmode;
 if(typeof m==="string"&&VALID_PROGRESSION_MODES.indexOf(m)>=0)return m;
 if(ex.w&&ex.bw)return "added_weight";
 if(ex.w)return "weight";
 if(ex.unit==="seconds")return "seconds";
 if(ex.cat==="skill")return "progression";
 return "reps";
}
// Sätze einer Übung in Woche w als saubere Session [{reps,weight}] – oder null falls leer.
function sessionFor(ex,w){
 var c=S.logs[w+"|"+S.day+"|"+ex.id];if(!c||!c.sets)return null;
 var need=setsForWeek(ex.cat,w),sets=[],any=false;
 for(var i=0;i<need;i++){var s=c.sets[i]||{reps:"",weight:""};if(s.reps!=="")any=true;sets.push({reps:s.reps,weight:s.weight});}
 return any?sets:null;
}
// Frühere Sessions (neueste zuerst), für "zwei Einheiten in Folge"-Regel.
function priorSessions(ex,w){var out=[];for(var k=w-1;k>=1;k--){var s=sessionFor(ex,k);if(s)out.push(s);}return out;}
// Bewertung der Wiederholungen ggü. Zielbereich: increase | hold | below | none
function repBucket(sets,repRange,settings){
 if(!repRange||!sets)return "none";
 var top=repRange[1],bot=repRange[0],allTop=true,anyTop=false,minR=Infinity,any=false;
 sets.forEach(function(s){if(s.reps===""||s.reps==null)return;any=true;var r=Number(s.reps);if(r<top)allTop=false;if(r>=top)anyTop=true;if(r<minR)minR=r;});
 if(!any)return "none";
 if(settings.requireAllSetsForIncrease?allTop:anyTop)return "increase";
 if(minR<bot)return "below";
 return "hold";
}
// Konkrete Gewichtserhöhung: nutzt vorhandene Daten (Epley-Schätzung), gedeckelt.
function increasedWeight(curW,inc,repRange,sets){
 if(curW<=0)return inc; // z.B. added_weight ohne Zusatz -> erstmal +inc
 var bot=repRange?repRange[0]:8,minR=Infinity;
 (sets||[]).forEach(function(s){if(s.reps!==""&&s.reps!=null){var r=Number(s.reps);if(r<minR)minR=r;}});
 if(minR===Infinity)minR=bot;
 var e1rm=curW*(1+minR/30),target=e1rm/(1+bot/30),step=target-curW;
 var cap=Math.max(inc,Math.min(curW*0.12,inc*4));
 if(step<inc)step=inc;if(step>cap)step=cap;
 step=Math.round(step/inc)*inc;if(step<inc)step=inc;
 return round(curW+step);
}
// Deload-Gewicht aus letztem schweren Arbeitsgewicht.
function calculateDeloadValue(weight,settings){var s=settings||DEFAULT_WORKOUT_SETTINGS;return round((Number(weight)||0)*s.deloadMultiplier);}
// Coach-Text NUR aus der berechneten Empfehlung erzeugen.
function buildCoachMessage(rec){
 var a=rec&&rec.action,inc=rec&&rec.increment,mode=rec&&rec.mode,nw=rec&&rec.nextWeight;
 if(a==="increase"){
  if(mode==="weight"||mode==="added_weight")return "Steigern: nächstes Mal +"+inc+" kg"+(nw!=null?" (≈ "+nw+" kg)":"");
  if(mode==="seconds")return "Steigern: nächstes Mal +"+inc+" s Haltezeit";
  return "Steigern: nächstes Mal +"+inc+" Wiederholung(en)";
 }
 if(a==="hold"){
  if(mode==="seconds")return "Halten: gleiche Belastung, versuche eine längere Haltezeit";
  if(mode==="reps")return "Halten: versuche mehr Wiederholungen";
  return "Halten: Gewicht bleibt gleich, versuche mehr Wiederholungen";
 }
 if(a==="decrease")return "Reduzieren: Gewicht war wahrscheinlich zu hoch"+(nw!=null?" (≈ "+nw+" kg)":"");
 if(a==="deload")return "Deload: reduziertes Gewicht verwenden"+(nw!=null?" (≈ "+nw+" kg)":"");
 if(a==="technique")return "Technik prüfen: keine Steigerung empfohlen";
 if(a==="progression")return "Progression möglich: schwerere Variante testen";
 return "";
}
// KERN: Empfehlung fürs nächste Training aus den Session-Daten.
function calculateNextRecommendation(p){
 var ex=p.exercise||{},s=p.settings||DEFAULT_WORKOUT_SETTINGS;
 var mode=getExerciseProgressionMode(ex);
 var inc=(ex.inc!=null&&isFinite(ex.inc)&&ex.inc>0)?ex.inc:(DEFAULT_INCREMENT[mode]||DEFAULT_INCREMENT.weight);
 var cur=p.currentSession,repRange=p.repRange,curW=Number(p.currentWeight)||0;
 function res(o){o.mode=mode;o.increment=inc;if(o.nextWeight===undefined)o.nextWeight=null;o.message=buildCoachMessage(o);return o;}
 if(!cur||!cur.length)return res({action:"none",reason:"Noch keine Werte eingetragen."});
 if(p.isDeload)return res({action:"deload",nextWeight:calculateDeloadValue(curW,s),reason:"Deload – keine Progression, reduziertes Gewicht verwenden."});
 if(mode==="none")return res({action:"none",reason:"Für diese Übung ist keine automatische Progression vorgesehen."});
 if(mode==="progression"){
  if(repRange&&repBucket(cur,repRange,s)==="increase")return res({action:"progression",reason:"Zielbereich erreicht – nächste Skill-Stufe / schwerere Variante testen."});
  return res({action:"technique",reason:"Skill-Übung – sauber üben, keine automatische Gewichtssteigerung."});
 }
 var bucket=repBucket(cur,repRange,s);
 if(bucket==="increase"){
  if(mode==="weight"||mode==="added_weight")return res({action:"increase",nextWeight:increasedWeight(curW,inc,repRange,cur),reason:"Alle Arbeitssätze am oberen Wiederholungsbereich erreicht."});
  return res({action:"increase",reason:"Oberes Ziel erreicht – nächstes Mal etwas mehr."});
 }
 if(bucket==="below"){
  var prevBelow=p.lastSession?(repBucket(p.lastSession,repRange,s)==="below"):false;
  if(prevBelow&&s.allowAutoDecrease&&(mode==="weight"||mode==="added_weight"))
   return res({action:"decrease",nextWeight:Math.max(0,round(curW-inc)),reason:"Zwei Einheiten in Folge unter dem unteren Wiederholungsbereich."});
  return res({action:"hold",nextWeight:(mode==="weight"||mode==="added_weight")?curW:null,reason:"Unter dem Zielbereich – Gewicht halten und Wiederholungen aufbauen."});
 }
 return res({action:"hold",nextWeight:(mode==="weight"||mode==="added_weight")?curW:null,reason:"Im Zielbereich, aber noch nicht oben – Gewicht halten, mehr Wiederholungen anstreben."});
}
// Bindeglied: holt die Daten aus dem App-Speicher und ruft die reine Logik.
function recommendForWeek(ex,w){
 var W=PROG().weeks[w-1],phase=W?W.phase:"aufbau",prior=priorSessions(ex,w);
 var curW=actualMinWeight(ex,w);if(curW==null)curW=baseWeight(ex,w);
 return calculateNextRecommendation({
  exercise:ex,settings:getWorkoutSettings(),repRange:catReps(ex,phase),currentWeight:curW,
  currentSession:sessionFor(ex,w),lastSession:prior[0]||null,previousSession:prior[1]||null,
  isDeload:phase==="deload"
 });
}
// Schwere-Basis-Kette (für Ziel-/Arbeitsgewicht). Deload ändert die schwere Basis nicht.
function nextWeight(ex,w){
 var W=PROG().weeks[w-1];if(!W||W.phase==="deload")return null;
 var mode=getExerciseProgressionMode(ex);if(mode!=="weight"&&mode!=="added_weight")return null;
 if(!cellComplete(w,S.day,ex))return null;
 var rec=recommendForWeek(ex,w);
 if(rec.action==="increase"||rec.action==="decrease"||rec.action==="hold")return rec.nextWeight;
 return null;
}
function baseWeight(ex,w){
 var ov=S.tg[w+"|"+ex.id];if(ov!=null&&ov!=="")return Number(ov);
 if(w<=1)return ex.def||0;
 var nw=nextWeight(ex,w-1);if(nw!=null)return nw;
 var base=baseWeight(ex,w-1),prevW=PROG().weeks[w-2];
 if(prevW&&prevW.phase==="deload"){var mode=getExerciseProgressionMode(ex);if(mode==="weight"||mode==="added_weight")return round(base*getWorkoutSettings().postDeloadReturnMultiplier);}
 return base;
}
function targetWeight(ex){return round(baseWeight(ex,S.week)*wfOf(PROG().weeks[S.week-1]));}
function lastPerf(ex){for(var w=S.week-1;w>=1;w--){var c=S.logs[w+"|"+S.day+"|"+ex.id];if(c&&c.sets&&c.sets.some(function(s){return s.reps!==""&&s.reps!=null;}))return{week:w,sets:c.sets};}return null;}
function weekFrac(w){var d=0,t=0,ds=PROG().days;for(var a=0;a<ds.length;a++)for(var i=0;i<ds[a].ex.length;i++){t++;if(cellComplete(w,ds[a].key,ds[a].ex[i]))d++;}return t?d/t:0;}
function dayComplete(w,dk){
 var day=dayByKey(dk);
 return day.ex.length>0&&day.ex.every(function(ex){return cellComplete(w,dk,ex);});
}
function dayWasInterrupted(w,dk){
 return S.history.some(function(e){return e.week===w&&e.day===dk&&e.complete!==true;});
}
function historyForDay(w,dk){return S.history.filter(function(e){return e.week===w&&e.day===dk;});}
function replaceDayHistory(w,dk,entry){
 for(var i=S.history.length-1;i>=0;i--)if(S.history[i].week===w&&S.history[i].day===dk)S.history.splice(i,1);
 S.history.unshift(entry);if(S.history.length>200)S.history.length=200;
}
function resetDayLogs(w,dk){
 var prefix=w+"|"+dk+"|";
 for(var key in S.logs)if(key.indexOf(prefix)===0)delete S.logs[key];
}
function changeWeek(target){
 if(active()||target===S.week||target<1||target>PROG().weeks.length)return;
 S.week=target;save();renderView();renderBar();
}
function changeDay(target){
 if(active()||target===S.day||dayKeys().indexOf(target)<0)return;
 S.day=target;save();renderView();renderBar();
}
function skippedBeforeSelection(){
 var ordered=weekLayout().filter(function(day){return !!day;});
 var currentIndex=ordered.map(function(day){return day.key;}).indexOf(S.day);
 var skipped=[];
 for(var w=1;w<=S.week;w++){
  var limit=w===S.week?currentIndex:ordered.length;
  for(var i=0;i<limit;i++)if(!dayComplete(w,ordered[i].key))skipped.push({week:w,day:ordered[i]});
 }
 return skipped;
}
function findEx(id){var ex=dayByKey(S.day).ex;for(var i=0;i<ex.length;i++)if(ex[i].id===id)return ex[i];return null;}
function active(){return !!S.workout;}

var REC_COLOR={increase:"emerald",hold:"amber",decrease:"orange",deload:"sky",technique:"amber",progression:"emerald"};
function recHtml(ex){
 if(!isDone(ex))return "";

function setRowHtml(ex,i,s,rr,tw,dis){

 return h+'</div>';

function exHistory(ex){
 var rows=[];
 for(var w=1;w<=PROG().weeks.length;w++){
  var c=S.logs[w+"|"+S.day+"|"+ex.id];if(!c||!c.sets)continue;
  var need=setsForWeek(ex.cat,w),parts=[],vol=0,has=false;
  var e1=0;
  for(var i=0;i<need;i++){var s=c.sets[i];if(s&&s.reps!==""){has=true;if(ex.w&&s.weight!==""&&Number(s.weight)>0){parts.push(s.reps+"×"+s.weight);vol+=Number(s.reps)*Number(s.weight);var est=Number(s.weight)*(1+Number(s.reps)/30);if(est>e1)e1=est;}else{parts.push(isTime(ex)?(s.reps+" s"):(""+s.reps));}}}
  if(has)rows.push({w:w,label:PROG().weeks[w-1].label,parts:parts,vol:vol,e1:e1>0?round(e1):null});
 }
 return rows;
}
function sparkline(vals){
 var w=280,h=44,min=Math.min.apply(null,vals),max=Math.max.apply(null,vals);
 if(max===min)max=min+1;
 var pts=vals.map(function(v,i){return((i/(vals.length-1))*(w-8)+4).toFixed(1)+","+(((1-(v-min)/(max-min))*(h-10))+5).toFixed(1);}).join(" ");
 return '<svg width="100%" viewBox="0 0 '+w+' '+h+'" style="display:block;margin:2px 0 10px" aria-hidden="true"><polyline points="'+pts+'" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function showHistory(ex){

 if(!rows.length){body='<p style="color:#71717a;margin:0">Für diese Übung wurde noch nichts eingetragen.</p>';}
 else{

  body="";
  if(ex.w&&e1s.length>=2)body+='<div style="font-size:11px;color:#71717a;margin-bottom:2px">Geschätztes 1RM: '+e1s[0]+' → '+e1s[e1s.length-1]+' kg</div>'+sparkline(e1s);
  body+='<table class="htbl"><thead><tr><th>Woche</th><th>Sätze'+(ex.w?' (Wdh×kg)':(isTime(ex)?' (Sek)':' (Wdh)'))+'</th>'+(ex.w?'<th style="text-align:right">Vol.</th>':'')+'</tr></thead><tbody>';
  rows.forEach(function(r){
   body+='<tr'+(r.w===S.week?' class="cur"':'')+'><td class="wk">W'+r.w+'<span class="hwl">'+esc(r.label)+'</span></td><td>'+esc(r.parts.join(" · "))+'</td>'+(ex.w?'<td class="vol">'+(r.vol>0?r.vol+" kg":"–")+'</td>':'')+'</tr>';
  });

 showModal("Verlauf · "+esc(ex.name),body,[{label:"Schließen",cls:"primary",action:null}]);
}

 h+='<div class="hdr"><div class="topright">'+themeButtonHtml()+'<button class="linkbtn" id="libbtn">Programme</button><button class="linkbtn" id="pdf">Auswertung</button></div><h1 class="ptitle">'+esc(P.name)+'</h1><p class="sub">'+P.days.length+' Tage · '+P.weeks.length+' Wochen</p></div>';
 if(active()){
  h+='<div class="panel sessionlock"><div class="eyebrow">Laufendes Training</div><div class="week">Woche '+wk.n+'<span class="muted"> / '+P.weeks.length+'</span></div><div class="trainingday">'+esc(day.wd||day.key)+(day.title?' · '+esc(day.title):'')+'</div></div>';

var BAR_KEY="tb-barweight";

function plateBreakdown(total,bar){
 var perSide=(total-bar)/2;
 if(perSide<-0.001)return null;
 var plates=[25,20,15,10,5,2.5,1.25,0.5],out=[],rem=perSide;
 plates.forEach(function(p){var n=Math.floor((rem+1e-9)/p);if(n>0){out.push(n+"× "+p+" kg");rem=Math.round((rem-n*p)*1000)/1000;}});
 return{list:out,rest:rem,perSide:Math.round(perSide*100)/100};
}

 var bd=plateBreakdown(total,bar),msg;
 if(bd==null)msg="Zielgewicht ("+total+" kg) liegt unter dem Stangengewicht ("+bar+" kg).";
 else{
  msg="Ziel <b>"+total+" kg</b> · Stange <b>"+bar+" kg</b><br>Pro Seite ("+bd.perSide+" kg):<br><b>"+(bd.list.length?bd.list.join(" + "):"keine Scheiben")+"</b>";
  if(bd.rest>0.01)msg+="<br><span style='opacity:.7'>Rest "+bd.rest+" kg pro Seite nicht stapelbar.</span>";

 if(!ex.bw)[0,10,15,20].forEach(function(bw){if(bw!==bar)btns.push({label:"Stange: "+bw+" kg",action:function(){setBarWeight(bw);showPlates(ex);}});});

 }

function parseProgram(text){
 var ext;try{ext=JSON.parse(text);}catch(e){return{err:"Kein gültiges JSON: "+e.message};}
 if(!ext||ext.format!=="trainings-block")return{err:'Feld "format":"trainings-block" fehlt.'};
 if(!ext.categories||typeof ext.categories!=="object"||Array.isArray(ext.categories)||!Object.keys(ext.categories).length)return{err:'"categories" fehlt oder ist leer.'};
 if(!Array.isArray(ext.weeks)||!ext.weeks.length)return{err:'"weeks" fehlt oder ist leer.'};
 if(!Array.isArray(ext.days)||!ext.days.length)return{err:'"days" fehlt oder ist leer.'};
 if(ext.name&&String(ext.name).length>LIMITS.maxNameLen)return{err:'Programmname zu lang ('+String(ext.name).length+' Zeichen). Maximal '+LIMITS.maxNameLen+' Zeichen, damit der Titel sauber angezeigt wird.'};
 if(ext.weeks.length>LIMITS.maxWeeks)return{err:'Zu viele Wochen ('+ext.weeks.length+'). Ein Trainingsblock hat höchstens '+LIMITS.maxWeeks+' Wochen – teile längere Pläne in mehrere Programme.'};
 if(ext.days.length>LIMITS.maxDays)return{err:'Zu viele Trainingstage ('+ext.days.length+'). Maximal '+LIMITS.maxDays+' pro Woche (eine Woche hat 7 Tage).'};
 var seenKeys={};
 for(var i=0;i<ext.days.length;i++){var d=ext.days[i];if(!d.key)return{err:'Tag '+(i+1)+': "key" fehlt.'};if(seenKeys[d.key])return{err:'Tag-"key" "'+esc(d.key)+'" kommt doppelt vor – jeder Tag braucht einen eindeutigen key.'};seenKeys[d.key]=1;if(d.weekday&&String(d.weekday).length>LIMITS.maxLabelLen)return{err:'Tag '+esc(d.key)+': "weekday" zu lang ('+String(d.weekday).length+' Zeichen). Maximal '+LIMITS.maxLabelLen+' Zeichen, damit die Tag-Auswahl sauber passt.'};if(!Array.isArray(d.exercises)||!d.exercises.length)return{err:'Tag '+esc(d.key)+': "exercises" fehlt/leer.'};if(d.exercises.length>LIMITS.maxExPerDay)return{err:'Tag '+esc(d.key)+': zu viele Übungen ('+d.exercises.length+'). Maximal '+LIMITS.maxExPerDay+' pro Tag.'};for(var j=0;j<d.exercises.length;j++){var x=d.exercises[j];if(!x.name)return{err:'Tag '+esc(d.key)+', Übung '+(j+1)+': "name" fehlt.'};if(!x.category)return{err:'Tag '+esc(d.key)+', Übung '+(j+1)+' ('+esc(x.name||"?")+'): "category" fehlt.'};if(!ext.categories[x.category])return{err:'Tag '+esc(d.key)+', Übung "'+esc(x.name)+'": category "'+esc(x.category)+'" ist nicht in "categories" definiert.'};}}
 for(var wi=0;wi<ext.weeks.length;wi++){var wk=ext.weeks[wi];if(wk.sets&&typeof wk.sets==="object"){for(var ck in wk.sets){if(!ext.categories[ck])return{err:'Woche '+(wk.n||wi+1)+': "sets" verweist auf unbekannte Kategorie "'+esc(ck)+'".'};if(wk.sets[ck]>LIMITS.maxSets)return{err:'Woche '+(wk.n||wi+1)+', Kategorie "'+esc(ck)+'": '+wk.sets[ck]+' Sätze sind zu viel (max. '+LIMITS.maxSets+').'};}}}
 return{prog:importTranslate(ext)};
}

function extractProgram(text){
 var t=String(text||"").replace(/```json|```/g,"");
 var a=t.indexOf("{"),b=t.lastIndexOf("}");
 if(a<0||b<=a)return null;
 var cand=t.slice(a,b+1);
 try{var o=JSON.parse(cand);if(o&&o.format==="trainings-block")return cand;}catch(e){}
 return null;
}
var VAGUE_RE=/ersatz|alternativ|variabel|wahlweise|nach wahl|o\.\s?ä|ähnlich|\boder\b/i;

 (prog.days||[]).forEach(function(d){(d.exercises||[]).forEach(function(x){if(x.name&&VAGUE_RE.test(x.name))out.push(x.name);});});
 return out;
}

function coachCall(){
 fetch("/.netlify/functions/coach",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({messages:coachMsgs})})
 .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};}).catch(function(){return{ok:false,d:{error:"Ung\u00fcltige Antwort vom Server"}};});})
 .then(function(res){
  if(!res.ok||res.d.error){coachBusy=false;coachErr="Fehler: "+(res.d.error||"Server nicht erreichbar");renderCoach();return;}
  var text=res.d.text||"",prog=extractProgram(text);
  var chk=prog?parseProgram(prog):{err:"Kein g\u00fcltiges JSON in der Antwort."};
  if(chk.err){
   if(!coachRetried){
    coachRetried=true;
    coachMsgs.push({role:"assistant",content:text});
    coachMsgs.push({role:"user",content:"Das JSON war ung\u00fcltig: "+chk.err+" Sende jetzt NUR das vollst\u00e4ndige korrigierte JSON."});
    coachCall();return;
   }
   coachBusy=false;coachErr="Die KI hat kein g\u00fcltiges Programm geliefert ("+chk.err+"). Neu starten und erneut versuchen.";renderCoach();return;
  }
  var vg=vagueExercises(chk.prog);
  if(vg.length&&!coachVagueRetried){
   coachVagueRetried=true;
   coachMsgs.push({role:"assistant",content:text});
   coachMsgs.push({role:"user",content:"Diese Übungsnamen sind nicht eindeutig: "+vg.join(", ")+". Ersetze sie durch konkrete, eindeutig ausführbare Übungen mit Equipment-Angabe (keine Wörter wie Ersatz/Alternative/oder). Sende NUR das vollständige korrigierte JSON."});
   coachCall();return;
  }
  coachMsgs.push({role:"assistant",content:prog});
  var dsc="";try{dsc=String(JSON.parse(prog).description||"");}catch(e){}
  coachBusy=false;coachProgram=prog;coachProgObj=chk.prog;coachDesc=dsc.slice(0,200);coachErr=null;renderCoach();
 })
 .catch(function(){coachBusy=false;coachErr="Netzwerkfehler. Ist die Function mit deployed (Ordner netlify/functions)?";renderCoach();});
}

 if(b.dataset.optm){var mst=COACH_STEPS[coachStep];if(mst){var arr=coachAns[mst.k]||[];var mix=arr.indexOf(b.dataset.optm);if(mix>=0)arr.splice(mix,1);else{if(mst.excl){if(b.dataset.optm===mst.excl)arr=[];else{var ki=arr.indexOf(mst.excl);if(ki>=0)arr.splice(ki,1);}}arr.push(b.dataset.optm);}coachAns[mst.k]=arr;renderCoach();}return;}
 if(b.id==="coachnext"){var nst=COACH_STEPS[coachStep];if(nst&&nst.free){var fri=document.getElementById("freeinp");coachAns[nst.k]=fri?fri.value.trim():"";}coachAdvance(1);renderCoach();return;}
 if(b.id==="coachcreate"){coachCreate();return;}
 if(b.id==="coachload"){if(coachProgram)importProgram(coachProgram);return;}
 if(b.id==="coachadj"){coachAdjust=!coachAdjust;renderCoach();return;}
 if(b.id==="adjsend"){coachSendAdj();return;}
 if(b.id==="coachrestart"){coachReset();renderCoach();return;}
 if(b.id==="libreset"){confirmReset();return;}
 if(b.id==="libload"){var ta=document.getElementById("libpaste");importProgram(ta?ta.value:"");return;}
 if(b.id==="explink"){var eo=exportTranslate(PROG());delete eo._anleitung;var u=location.origin+location.pathname+"#p="+btoa(unescape(encodeURIComponent(JSON.stringify(eo))));var okl=copyText(u);showModal(okl?"Link kopiert":"Kopieren nicht möglich",okl?"Wer den Link öffnet, bekommt dein Programm zum Laden angeboten (ohne deinen Fortschritt). Bei sehr großen Programmen kann der Link von Messengern gekürzt werden – dann Datei-Export nutzen.":"Nutze stattdessen den Datei-Export.",[{label:"OK",action:null}]);return;}
 if(b.id==="expfile"){downloadText((PROG().name||"programm").replace(/[^a-z0-9]+/gi,"_")+".json",exportCurrentJSON());return;}
 if(b.id==="expcopy"){var okc=copyText(exportCurrentJSON());showModal(okc?"Kopiert":"Kopieren nicht möglich",okc?"Das Programm liegt als JSON in der Zwischenablage – jetzt einer KI geben oder selbst bearbeiten, dann unter „2 · Programm laden“ einfügen.":"Konnte nicht kopieren. Nutze stattdessen „Als Datei“.",[{label:"OK",action:null}]);return;}
 if(b.id==="tplcopy"){copyText(JSON.stringify(BLANK_TEMPLATE,null,2));showModal("Beispiel-Vorlage kopiert","Eine vollständige, korrekte Beispiel-Vorlage liegt in der Zwischenablage – ideal als Muster für die KI.",[{label:"OK",action:null}]);return;}
 if(b.id==="tplfile"){downloadText("vorlage-trainings-block.json",JSON.stringify(BLANK_TEMPLATE,null,2));return;}
});
document.getElementById("lib").addEventListener("keydown",function(e){if(!e.target||e.key!=="Enter")return;if(e.target.id==="adjinp"){e.preventDefault();coachSendAdj();}else if(e.target.id==="freeinp"){e.preventDefault();var nb=document.getElementById("coachnext");if(nb)nb.click();}});
document.getElementById("lib").addEventListener("change",function(e){var t=e.target;if(t.id==="libfile"&&t.files&&t.files[0]){var r=new FileReader();r.onload=function(){importProgram(String(r.result));};r.readAsText(t.files[0]);}});
document.getElementById("lib").addEventListener("input",function(e){var t=e.target;if(t.id==="reninp"){var c=document.getElementById("rencnt");if(c)c.textContent=t.value.length+" / "+LIMITS.maxNameLen;}});
document.getElementById("lib").addEventListener("keydown",function(e){if(e.key==="Enter"&&e.target&&e.target.id==="reninp"){e.preventDefault();var sb=document.querySelector("#lib [data-rensave]");if(sb)sb.click();}});

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0b0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Satzkraft</title>
<link rel="manifest" href="manifest.json">
<style>
/* Lokale Schriften statt Google-CDN, damit die App offline vollständig funktioniert */
@font-face{font-family:'Hanken Grotesk';font-style:normal;font-weight:400 800;font-display:swap;src:url(fonts/hanken-grotesk-latin.woff2) format('woff2')}
@font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400 800;font-display:swap;src:url(fonts/jetbrains-mono-latin.woff2) format('woff2')}
</style>
<script>
(function(){
 try{
  var saved=localStorage.getItem("training-theme-v1");
  document.documentElement.dataset.theme=saved||(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");
 }catch(e){document.documentElement.dataset.theme="dark";}
})();
</script>
<style>
/* ===== Satzkraft Redesign 2026 – Design-Tokens ===== */
:root{
 --font:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
 --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
 --bodybg:radial-gradient(130% 90% at 50% -8%,#111418,#08090b 62%) fixed #0a0b0d;
 --bg:#0a0b0d;--panel:#121418;--panel2:#171a1f;--up:#1e2228;
 --hair:rgba(255,255,255,.09);--hair2:rgba(255,255,255,.16);
 --ink:#f3f3f1;--ink2:#c3c4c1;--muted:#7c7e82;--faint:#54565a;
 --acc:#37e0a2;--accd:#0f9d6b;--accg:rgba(55,224,162,.13);--accl:rgba(55,224,162,.34);
 --onacc:#04130c;
 --kraft:#f4b03e;--kraftg:rgba(244,176,62,.13);--kraftl:rgba(244,176,62,.38);
 --hyp:#37e0a2;
 --skill:#ac95f9;--skillg:rgba(172,149,249,.13);--skilll:rgba(172,149,249,.38);
 --core:#3cc0f2;--coreg:rgba(60,192,242,.12);--corel:rgba(60,192,242,.38);
 --orange:#eb8a4f;--orangeg:rgba(235,138,79,.13);--orangel:rgba(235,138,79,.38);
 --danger:#f87171;--dangerg:rgba(244,63,94,.14);--dangerl:rgba(244,63,94,.4);
 --scrim:rgba(0,0,0,.62);
 --barbg:rgba(8,9,11,.92);
}
html[data-theme="light"]{
 --bodybg:#efece5;
 --bg:#efece5;--panel:#ffffff;--panel2:#f8f6f1;--up:#f1eee7;
 --hair:rgba(24,22,20,.11);--hair2:rgba(24,22,20,.2);
 --ink:#171614;--ink2:#45433f;--muted:#83817b;--faint:#adaaa4;
 --acc:#0c9a67;--accd:#0a7d53;--accg:rgba(12,154,103,.12);--accl:rgba(12,154,103,.3);
 --onacc:#ffffff;
 --kraft:#bf7d17;--kraftg:rgba(191,125,23,.12);--kraftl:rgba(191,125,23,.32);
 --hyp:#0c9a67;
 --skill:#6a4fe0;--skillg:rgba(106,79,224,.1);--skilll:rgba(106,79,224,.3);
 --core:#0a86c4;--coreg:rgba(10,134,196,.1);--corel:rgba(10,134,196,.3);
 --orange:#c15f2c;--orangeg:rgba(193,95,44,.11);--orangel:rgba(193,95,44,.3);
 --danger:#b3261e;--dangerg:rgba(179,38,30,.1);--dangerl:rgba(179,38,30,.3);
 --scrim:rgba(28,24,18,.42);
 --barbg:rgba(239,236,229,.92);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{color-scheme:dark}
html[data-theme="light"]{color-scheme:light}
body{margin:0;background:var(--bodybg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--font)}
body.surface-locked{position:fixed;left:0;right:0;width:100%;overflow:hidden}
*{scrollbar-width:none}
::-webkit-scrollbar{display:none}
.wrap{max-width:560px;margin:0 auto;padding:max(20px,env(safe-area-inset-top)) 16px 130px}
.hdr{margin-bottom:16px}
.ptitle{font-size:22px;font-weight:800;margin:0;letter-spacing:-.02em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconbtn{background:none;border:none;color:var(--muted);font-size:18px;padding:6px;border-radius:8px;cursor:pointer}
.iconbtn:active{background:var(--up)}
.sub{font-size:12px;color:var(--muted);margin:6px 0 0}
.topright{display:flex;gap:2px;justify-content:flex-end;align-items:center;margin-bottom:8px}
.linkbtn{background:none;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;padding:5px 7px;border-radius:8px;white-space:nowrap}
.linkbtn:active{background:var(--up);color:var(--ink2)}
.themebtn{display:inline-flex;align-items:center;gap:4px}
.appversion{color:var(--muted);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em}
.panel{background:var(--panel);border:1px solid var(--hair);border-radius:20px;padding:17px;margin-bottom:16px}
.wknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.nav{width:38px;height:38px;border:1px solid var(--hair2);border-radius:12px;background:transparent;color:var(--ink);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav:disabled{opacity:.3}
.wknum{text-align:center}
.wknum .lbl{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.wknum .big{font-family:var(--mono);font-size:27px;font-weight:800;letter-spacing:-.03em;line-height:1;margin-top:3px}
.wknum .big span{color:var(--muted);font-size:15px;font-weight:600}
.bars{display:flex;align-items:flex-end;gap:6px;height:40px;margin-bottom:4px}
.bar{flex:1;height:100%;border-radius:6px;position:relative;overflow:hidden;border:1px solid var(--hair);background:var(--panel);cursor:pointer;padding:0;transition:border-color .15s}
.bar.deload{background:var(--coreg)}
.bar.cur{border-color:var(--acc);box-shadow:0 0 0 3px var(--accg)}
.bar .fill{position:absolute;left:0;right:0;bottom:0;background:var(--accd);transition:height .25s}
.bar .fill.full{background:var(--acc)}
.wknums{display:flex;gap:6px;margin-bottom:12px}
.wknums div{flex:1;text-align:center;font-family:var(--mono);font-size:8.5px;color:var(--muted)}
.wknums div.cur{color:var(--acc);font-weight:700}
.badge{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 11px;border-radius:999px;border:1px solid}
.badge.norm{background:var(--accg);color:var(--acc);border-color:transparent}
.badge.deload{background:var(--coreg);color:var(--core);border-color:transparent}
.rir{font-size:12px;color:var(--ink2);margin-left:8px}
.note{font-size:12px;color:var(--ink2);margin:8px 0 0;line-height:1.5}
.sessionlock{text-align:center;padding:18px 16px}
.sessionlock .eyebrow{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--acc);margin-bottom:7px}
.sessionlock .week{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.sessionlock .trainingday{font-size:14px;font-weight:600;color:var(--ink2);margin-top:8px}
.runhint{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.35}
.wstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.wday{padding:10px 2px;border-radius:13px;border:1px solid var(--hair);background:var(--panel);min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.wday.rest{opacity:.55;border-style:dashed;border-color:var(--hair2);background:transparent}
.wday.train{cursor:pointer}
.wday.train:active{background:var(--up)}
.wday.active{background:var(--acc);border-color:var(--acc)}
.wdn{font-size:12px;font-weight:700;color:var(--ink);line-height:1}
.wday.rest .wdn{font-weight:600;color:var(--faint)}
.wday.active .wdn{color:var(--onacc)}
.wstat{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--muted);line-height:1;min-height:11px}
.wday.done .wstat{color:var(--acc)}
.wday.active .wstat{color:var(--onacc);opacity:.72}
.dayhdr{display:flex;align-items:center;justify-content:space-between;margin:0 4px 12px}
.dayhdr.active{justify-content:flex-end}
.dayhdr h2{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--ink);margin:0}
.dayhdr .p{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted)}
.sessbox{background:var(--accg);border:1px solid var(--accl);color:var(--ink2);border-radius:12px;padding:8px 12px;font-size:12px;margin-bottom:8px}
.starthint{background:var(--accg);border:1px solid var(--accl);color:var(--ink2);border-radius:14px;padding:14px;font-size:13px;margin-bottom:14px;text-align:center;line-height:1.5}
.ex{position:relative;background:var(--panel);border:1px solid var(--hair);border-radius:16px;padding:16px;margin-bottom:12px}
.ex:before{content:"";position:absolute;left:0;top:15px;bottom:15px;width:3px;border-radius:0 3px 3px 0;background:transparent}
.ex:has(.tag.violet):before,.ex:has(.cardcat.violet):before{background:var(--skill)}
.ex:has(.tag.amber):before,.ex:has(.cardcat.amber):before{background:var(--kraft)}
.ex:has(.tag.emerald):before,.ex:has(.cardcat.emerald):before{background:var(--hyp)}
.ex:has(.tag.sky):before,.ex:has(.cardcat.sky):before{background:var(--core)}
.ex:has(.tag.orange):before,.ex:has(.cardcat.orange):before{background:var(--orange)}
.ex:has(.tag.rose):before,.ex:has(.cardcat.rose):before{background:var(--danger)}
.ex.done{border-color:var(--accl)}
.excompact{display:flex;align-items:center;gap:9px;padding:10px 12px}
.excompact:before{top:10px;bottom:10px}
.excompactname{flex:1;min-width:0;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.excompactcheck{color:var(--acc);font-size:17px;font-weight:800}
.ex.locked{opacity:.7}
.exhead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.exhead .info{flex:1;min-width:0}
.exdoneactions{display:flex;align-items:center;gap:7px;flex-shrink:0}
.donecollapse{width:32px;height:32px;display:inline-grid;place-items:center;border:1px solid var(--hair2);border-radius:8px;padding:0;background:transparent;color:var(--ink);cursor:pointer;visibility:hidden;pointer-events:none}
.donecollapse.ready{visibility:visible;pointer-events:auto}
.donecollapse .ico{width:17px;height:17px;transform:rotate(90deg)}
.tag{font-family:var(--mono);font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:7px;border:1px solid;display:inline-block}
.tag.violet{background:var(--skillg);color:var(--skill);border-color:transparent}
.tag.amber{background:var(--kraftg);color:var(--kraft);border-color:transparent}
.tag.emerald{background:var(--accg);color:var(--acc);border-color:transparent}
.tag.sky{background:var(--coreg);color:var(--core);border-color:transparent}
.tag.orange{background:var(--orangeg);color:var(--orange);border-color:transparent}
.tag.rose{background:var(--dangerg);color:var(--danger);border-color:transparent}
.tag.slate{background:var(--up);color:var(--ink2);border-color:transparent}
.exname{font-size:15px;font-weight:700;letter-spacing:-.01em;margin:0;line-height:1.3}
.exswap{font-size:11px;color:var(--kraft);margin:3px 0 0;line-height:1.4}
.excompactname small{color:var(--kraft);font-size:9px;font-weight:700;margin-left:4px}
.exen{font-family:var(--mono);font-size:11px;color:var(--muted);font-style:normal;margin:4px 0 0}
.exsub{font-family:var(--mono);font-size:11px;color:var(--muted);margin:6px 0 0}
.links{display:flex;flex-wrap:nowrap;align-items:center;gap:4px 12px;margin-top:7px;max-width:100%;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.links::-webkit-scrollbar{display:none}
.links>*{flex:none}
.links a,.links .g,.notebtn,.swapbtn,.plateaction{font-size:11px;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.links a:active{color:var(--acc)}
.notebtn,.swapbtn,.plateaction{border:0;background:none;padding:0;cursor:pointer;font-family:inherit}
.notebtn:active,.notebtn:hover,.swapbtn:active,.swapbtn:hover,.plateaction:active,.plateaction:hover{color:var(--acc)}
.swapqueued{margin:8px 0;padding:7px 9px;border:1px solid var(--kraftl);border-radius:8px;background:var(--kraftg);color:var(--kraft);font-size:11px;line-height:1.4}
.exnoteline{display:block;width:100%;margin:2px 0 9px;padding:7px 9px;border:1px solid var(--hair);border-radius:8px;background:var(--panel2);color:var(--ink2);font:inherit;font-size:11px;line-height:1.45;text-align:left;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g.ok{color:var(--acc)}
.g.proxy{color:var(--kraft)}
.chk{width:32px;height:32px;border-radius:999px;border:2px solid var(--hair2);color:var(--faint);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.chk.done{background:var(--acc);border-color:var(--acc);color:var(--onacc);animation:checkpop .2s ease-out}
.presc{display:flex;flex-wrap:nowrap;align-items:center;gap:4px 7px;font-family:var(--mono);font-size:13px;font-weight:500;color:var(--muted);background:var(--panel2);border-radius:10px;padding:8px 10px;margin-bottom:8px;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.presc::-webkit-scrollbar{display:none}
.presc span{flex:none}
.presc b{color:var(--ink);font-weight:700}
.presc .dot{color:var(--faint)}
.prescpause{display:inline-flex;align-items:center;gap:4px}
.prescpause .ico{width:14px;height:14px}
.platebtn{border:0;background:none;padding:3px 1px;margin:-3px -1px;color:inherit;font:inherit;cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-decoration-color:var(--muted);text-underline-offset:3px}
.platebtn:hover,.platebtn:focus-visible{color:var(--acc)}
.presctarget{display:inline-flex;align-items:baseline;gap:5px}
.targetcontext{font-size:10px;font-weight:750;color:var(--acc)}
.targetcontext.sky{color:var(--core)}
.targetcontext:empty{display:none}
.last{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:12px;min-width:0;width:100%;background:none;border:none;text-align:left;padding:4px 0;cursor:pointer;font-family:inherit;color:inherit}
.last:active{opacity:.6}
.last .l{color:var(--muted);flex-shrink:0}
.last .v{color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.last .histhint{margin-left:auto;color:var(--muted);flex-shrink:0;font-weight:600}
.otherlast{display:flex;align-items:center;gap:6px;font-size:11px;line-height:1.4;color:var(--muted);margin:-4px 0 12px;min-width:0}
.otherlast .l{color:var(--muted);flex-shrink:0}
.otherlast .v{color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inp{background:var(--panel2);border:1px solid var(--hair2);border-radius:10px;padding:6px;color:var(--ink);text-align:center;font-family:var(--mono);font-size:16px;font-weight:700;outline:none;min-width:0}
.inp:focus{border-color:var(--acc)}
.inp:disabled{opacity:.4}
.srows{display:flex;flex-direction:column;gap:6px}
.srow{display:flex;align-items:center;gap:6px;border:1px solid transparent;border-radius:10px;padding:4px 6px}
.srow.full{background:var(--accg);border-color:var(--accl);animation:setpulse .28s ease-out}
.srow .slbl{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--muted);width:24px;flex-shrink:0}
.srow .inp{flex:1}
.srow .unit{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);flex-shrink:0}
.editnote{font-size:12px;color:var(--muted);margin-top:8px;text-align:center}
.calibrationhint{display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left}
.calibrationhint>span{display:flex;flex-direction:column;gap:2px;min-width:0}
.calibrationhint strong{color:var(--ink2)}
.calibrationhint small{color:var(--muted);font-size:10px;line-height:1.4}
.calibrationhint .calibrationmore{flex:none}
.calibrationmore{display:inline;padding:0;border:0;background:none;color:var(--acc);font:inherit;font-weight:750;text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.platecalc{display:grid;gap:12px}
.platetarget{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding:12px 13px;border-radius:12px;background:var(--panel2);border:1px solid var(--hair)}
.platetarget span,.platelabel{color:var(--muted);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.platetarget b{font-family:var(--mono);font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1;color:var(--ink)}
.platechoices{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-top:6px}
.platechoices button{min-height:38px;border:1px solid var(--hair2);border-radius:9px;background:var(--panel);color:var(--ink2);padding:7px 6px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer}
.platechoices button.active{border-color:var(--acc);background:var(--accg);color:var(--acc)}
.plateresult{padding:13px;border-radius:12px;background:var(--accg);border:1px solid var(--accl);line-height:1.45}
.platesideweight{display:flex;align-items:center;justify-content:space-between;gap:12px}
.platesideweight span{color:var(--muted);font-size:11px;font-weight:700}
.platesideweight b{color:var(--acc);font-family:var(--mono);font-size:18px;font-weight:800;text-align:right}
.platehint{margin-top:7px;color:var(--kraft);font-size:10px;line-height:1.45}
.notearea{width:100%;min-height:130px;resize:vertical;background:var(--panel2);border:1px solid var(--hair2);border-radius:10px;color:var(--ink);padding:10px;font:inherit;line-height:1.45;outline:none}
.notearea:focus{border-color:var(--acc)}
.timefield{position:relative;flex:1;min-width:0}
.timefield .inp{width:100%;padding-right:43px}
.swbtn{position:absolute;right:3px;top:3px;bottom:3px;width:36px;display:inline-grid;place-items:center;padding:0;background:var(--coreg);border:0;border-left:1px solid var(--corel);color:var(--core);border-radius:0 6px 6px 0;cursor:pointer}
.swbtn:disabled{opacity:.38}
.swbtn.running{background:var(--accg);border-color:var(--accl);color:var(--acc)}
.swbtn .ico{width:16px;height:16px}
.rec{margin-top:12px;border:1px solid;border-radius:13px;padding:10px 12px;font-size:13px;font-weight:500;display:flex;gap:8px;align-items:flex-start;line-height:1.45;color:var(--ink2)}
.reccontext{display:block;margin-bottom:3px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.rec.emerald{background:var(--accg);border-color:var(--accl)}
.rec.emerald .reccontext,.rec.emerald .ico{color:var(--acc)}
.rec.amber{background:var(--kraftg);border-color:var(--kraftl)}
.rec.amber .reccontext,.rec.amber .ico{color:var(--kraft)}
.rec.sky{background:var(--coreg);border-color:var(--corel)}
.rec.sky .reccontext,.rec.sky .ico{color:var(--core)}
.rec.orange{background:var(--orangeg);border-color:var(--orangel)}
.rec.orange .reccontext,.rec.orange .ico{color:var(--orange)}
.ico{display:inline-block;width:1.05em;height:1.05em;vertical-align:-.16em;flex:none}
.iconbtn .ico{width:20px;height:20px}
.programheadtools{display:flex;align-items:center;gap:5px;margin-left:auto}
@keyframes setpulse{0%{background:var(--accl);transform:scale(.99)}100%{background:var(--accg);transform:scale(1)}}
@keyframes checkpop{0%{transform:scale(.72)}70%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 3px var(--accg),0 0 12px var(--accl)}50%{box-shadow:0 0 0 4px var(--accg),0 0 22px var(--accl)}}
@media(prefers-reduced-motion:reduce){.srow.full,.chk.done{animation:none}}
.legend{margin-top:30px;background:none;border:0;padding:4px;font-size:10px;color:var(--muted);line-height:1.5;text-align:center}
.mainfooteractions{display:flex;justify-content:center;margin:0 0 5px}
.legend .themebtn{min-height:36px;padding:6px 10px;color:var(--ink2)}
.legend b{color:var(--ink2)}
#bar{position:fixed;left:0;right:0;bottom:0;background:var(--barbg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--hair);padding:10px 16px calc(10px + env(safe-area-inset-bottom));z-index:40}
#bar.is-hidden{display:none}
.barwrap{max-width:528px;margin:0 auto;display:flex;flex-wrap:wrap;gap:8px 10px;align-items:center}
.start-only{width:100%;display:flex;justify-content:center}
.start-only .bbtn{width:100%;padding:12px}
.restbar{position:relative;overflow:hidden;width:100%;min-height:56px;border:1px solid var(--accl);border-radius:16px;background:var(--panel)}
.restfill{position:absolute;inset:0 auto 0 0;width:100%;background:var(--accg);transition:width .25s linear}
.restbar.ready{border-color:var(--acc)}
.restbar.ready .restfill{background:var(--accg)}
.restbar.setmode{border-color:var(--corel)}
.restbar.setmode .restfill{background:var(--coreg)}
.restcontent{position:relative;z-index:1;min-height:56px;display:flex;align-items:center;gap:8px;padding:8px 9px}
.restname{min-width:0;flex:1}
.restname .main{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.restname .subline{font-family:var(--mono);font-size:9.5px;font-weight:600;color:var(--acc);margin-top:2px}
.restcontent .tbig{min-width:46px;text-align:center}
.nextpause{background:var(--acc);color:var(--onacc)}
.restbar.holdmode{border-color:var(--corel)}
.restbar.holdmode .restfill{background:var(--coreg);transition:width .2s,background .2s}
.restbar.holdmode .bbtn.go{background:var(--ink);color:var(--bg);box-shadow:0 0 0 1px var(--hair2)}
.holdactions{display:flex;gap:6px;align-items:center}
.workoutbar{width:100%;min-height:56px;display:flex;align-items:center;gap:8px;padding:7px 8px;border:1px solid var(--accl);border-radius:16px;background:var(--panel)}
.workoutbar.paused{border-color:var(--kraftl)}
.workoutbarstate{flex:1;min-width:0;padding-left:3px}
.workoutbarstate .label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);white-space:nowrap}
.workoutbar.paused .workoutbarstate .label{color:var(--kraft)}
.workoutbarstate .time{font-family:var(--mono);font-size:20px;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-top:2px}
.workoutbar .bbtn{min-height:40px;padding:7px 10px}
.bar-hidden .wrap{padding-bottom:40px}
body.rest-lock{--rest-mode:1}
.wt,.rt{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.rt{justify-content:flex-end}
.tbig{font-family:var(--mono);font-size:18px;font-weight:800;letter-spacing:-.02em}
.rt.run .tbig{color:var(--acc)}
.tlbl{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.bbtn{border:1px solid var(--hair2);border-radius:12px;padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;background:var(--panel);color:var(--ink);white-space:nowrap}
.bbtn.go{border-color:transparent;background:var(--acc);color:var(--onacc);font-weight:800;box-shadow:0 10px 24px -10px var(--accl)}
.bbtn.pause{background:var(--panel);color:var(--kraft);border-color:var(--kraftl)}
.bbtn.stop{border-color:transparent;background:var(--dangerg);color:var(--danger)}
.bbtn.mini{padding:7px 9px;font-size:12px}
.muted{font-size:11px;color:var(--muted)}
@media(max-width:430px){
 .wrap{padding-bottom:calc(145px + env(safe-area-inset-bottom))}
 .start-only{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
 .start-only>div{grid-column:1/-1;min-width:0;text-align:center}
 .start-only .bbtn{min-width:0;white-space:normal}
 .start-only .bbtn:only-of-type{grid-column:1/-1}
 .restcontent{gap:5px;padding:7px}
 .restcontent .bbtn.mini{padding:7px}
 .restbar.holdmode .restcontent{display:grid;grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"holdname holdtime" "holdactions holdactions";gap:7px 10px;padding:8px 9px}
 .restbar.holdmode .restname{grid-area:holdname}.restbar.holdmode .tbig{grid-area:holdtime}.restbar.holdmode .holdactions{grid-area:holdactions;display:grid;grid-template-columns:minmax(0,1fr) auto}.restbar.holdmode .holdactions .bbtn.go{width:100%}
 .workoutbar{gap:6px}
 .workoutbar .bbtn{padding:7px 9px;font-size:12px}
}

 for(var key in logs){if(key.indexOf(prefix)!==0)continue;var cell=logs[key];if(cell&&Array.isArray(cell.sets)&&cell.sets.some(function(set){return set&&(set.reps!==""&&set.reps!=null||set.weight!==""&&set.weight!=null);}))return true;}

 if(historyMarksComplete(store&&store.history,w,dk))return true;var day=(program.days||[]).filter(function(item){return item.key===dk;})[0],exercises=dayExercisesFor(day,w),logs=store&&store.logs||{};

}
function currentTrainingWeekFor(program,store){
 var max=program.weeks.length,highest=0,history=Array.isArray(store&&store.history)?store.history:[];
 for(var w=1;w<=max;w++){
  var begun=history.some(function(entry){return entry&&entry.week===w;});
  if(!begun)for(var di=0;di<program.days.length&&!begun;di++)begun=storeUnitHasSetValues(store,w,program.days[di].key);

function canStartRest(ex,sets,firstOpen,allowAfterLast){
 if(!active())return false;

 return true;
}
var AUTO_REST_DELAY=0,autoRestTimers={};
function cancelAutoRest(exid){var timer=autoRestTimers[exid];if(timer){clearTimeout(timer);delete autoRestTimers[exid];}}
function cancelAllAutoRest(){Object.keys(autoRestTimers).forEach(cancelAutoRest);}
function scheduleAutoRest(ex,setIndex,wasComplete,isComplete){
 var pending=autoRestTimers[ex.id];
 if(!isComplete){cancelAutoRest(ex.id);return;}
 if(wasComplete&&!pending)return;
 cancelAutoRest(ex.id);
 autoRestTimers[ex.id]=setTimeout(function(){
  delete autoRestTimers[ex.id];
  if(!active()||(restPhase&&!(restPhase==="set"&&restExId===ex.id)))return;
  var current=getSets(ex),firstOpen=firstOpenSet(ex,current);
  if(!current[setIndex]||!setComplete(ex,current[setIndex])||!canStartRest(ex,current,firstOpen,true))return;
  startRest(catRest(ex),ex.id,true);
 },AUTO_REST_DELAY);
}
function canStartHold(ex,sets,firstOpen){

function updatePauseButton(ex){

 });
}
function setInputLocked(ex,index,sets,firstOpen){
 sets=sets||getSets(ex);if(firstOpen==null)firstOpen=firstOpenSet(ex,sets);var lock=!active()||index>firstOpen;
 if(restPhase){
  if(restExId!==ex.id)lock=true;
  else if(restPhase==="countdown")lock=lock||index>=restNextSet;
  else if(restPhase==="set")lock=lock||index>restNextSet;
  else if(restPhase==="hold")lock=true;
 }
 return lock;
}
function applyLocks(ex){
 var sets=getSets(ex),firstOpen=firstOpenSet(ex,sets);
 for(var j=0;j<sets.length;j++){
  var lock=setInputLocked(ex,j,sets,firstOpen);
  var rep=document.getElementById("rep-"+ex.id+"-"+j),wt=document.getElementById("wt-"+ex.id+"-"+j);
  if(rep)rep.disabled=lock;
  if(wt)wt.disabled=lock;
  document.querySelectorAll('.stp[data-ex="'+ex.id+'"][data-i="'+j+'"]').forEach(function(btn){
   var ref=btn.dataset.step==="wt"?wt:rep;btn.disabled=ref?ref.disabled:lock;
  });
 }
 updatePauseButton(ex);
}
function applyAllLocks(){dayExercisesFor(dayByKey(S.day),S.week).forEach(function(ex){applyLocks(ex);});}
function requestPersistentStorageOnce(){
 try{
  if(localStorage.getItem(PERSIST_REQUEST_KEY))return;
  localStorage.setItem(PERSIST_REQUEST_KEY,"requested");

 }catch(e){}
}

  var correctedRow=document.getElementById("row-"+exid+"-"+i);if(correctedRow)correctedRow.classList.toggle("full",setComplete(ex,corrected[i]));updateCard(ex);updateProgressUI();return;
 }

 var sets=getSets(ex);if(setInputLocked(ex,i,sets,firstOpenSet(ex,sets))){var stored=sets[i]&&sets[i][isW?"weight":"reps"]||"";if(!isW&&isTime(ex))setTimeInputValue(t,ex,stored);else t.value=stored;applyLocks(ex);return;}
 collapseDoneExcept(exid);
 var wasComplete=setComplete(ex,sets[i]);sets[i]=Object.assign({},sets[i]);sets[i][isW?"weight":"reps"]=v;
 if(!isW&&ex.w&&v!==""&&(sets[i].weight==null||sets[i].weight==="")){var planned=round(targetWeight(ex)),fillWeight=0;for(var pi=i-1;pi>=0;pi--){if(Number(sets[pi]&&sets[pi].weight)>0){fillWeight=round(Number(sets[pi].weight));break;}}if(fillWeight<=0)fillWeight=planned;if(fillWeight>0||ex.bw){sets[i].weight=String(Math.max(0,fillWeight));var autoWeight=document.getElementById("wt-"+exid+"-"+i);if(autoWeight)autoWeight.value=String(Math.max(0,fillWeight));}}
 if(isW&&v!==""&&(sets[i].reps==null||sets[i].reps==="")){var autoRange=catReps(ex,PROG().weeks[S.week-1].phase);if(autoRange){sets[i].reps=String(autoRange[1]);var autoReps=document.getElementById("rep-"+exid+"-"+i);if(autoReps)setTimeInputValue(autoReps,ex,autoRange[1]);}}
 var nowComplete=setComplete(ex,sets[i]);scheduleAutoRest(ex,i,wasComplete,nowComplete);
 if(!wasComplete&&nowComplete&&typeof requestPersistentStorageOnce==="function")requestPersistentStorageOnce();
 writeSets(ex,sets);save();if(typeof updateTargetWeightUi==="function")updateTargetWeightUi(ex);
 var row=document.getElementById("row-"+exid+"-"+i);if(row)row.classList.toggle("full",setComplete(ex,sets[i]));
 var focusedSet=restPhase==="set"&&restExId===exid&&i===restNextSet;
 updateCard(ex);applyLocks(ex);
 if(focusedSet){if(firstOpenSet(ex,sets)>=sets.length)stopRest();else renderBar();}
 updateProgressUI();maybeAskDone();
}
function onSetChange(t){

 var p=t.id.split("-"),kind=p[0],exid=p[1],i=+p[2],ex=findEx(exid),isW=(kind==="wt");

 var msg="<b>"+esc(currentExerciseSwap(ex)||ex.name)+"</b><br>Satz "+(i+1)+": "+(oldShown===""?"—":esc(oldShown))+" → <b>"+(newShown===""?"—":esc(newShown))+"</b> "+unit+"<br><br>"+CORRECTION_EFFECT_COPY;
 showModal("Wert übernehmen?",msg,[
  {label:"Übernehmen",cls:"primary",action:function(){var ss=getSets(ex);ss[i]=Object.assign({},ss[i]);ss[i][field]=nv;writeSets(ex,ss);save();renderView();}},

 ]);

function onStep(b){
 var kind=b.dataset.step,exid=b.dataset.ex,i=+b.dataset.i,d=+b.dataset.d,ex=findEx(exid);
 if(!ex)return;
 var input=document.getElementById((kind==="wt"?"wt-":"rep-")+exid+"-"+i);
 if(!input||input.disabled)return;
 var isW=kind==="wt",timeStep=!isW&&isTime(ex),step=isW?(ex.inc||2.5):(timeStep?5:1),v;
 if(input.value===""){
  if(isW){v=targetWeight(ex);}
  else{var wk=PROG().weeks[S.week-1],rr=catReps(ex,wk.phase);v=rr?rr[1]:(d>0?step:0);}
  v=Number(v)||0;
 }else{v=Number(timeStep?(timeInputSeconds(input,ex)||0):input.value)+d*step;}
 if(v<0)v=0;
 if(timeStep)setTimeInputValue(input,ex,Math.round(v));
 else input.value=String(isW?round(v):Math.round(v));

}

 {version:"v0.31.0",date:"22.07.2026",changes:["Die Stufe eines Programms (z. B. Einsteiger) steht überall als eigene Zeile unter dem Programmnamen – und nie mehr doppelt, wenn sie schon im Namen steckt.","Die Programmvorlagen heißen jetzt kurz „Gym Ganzkörper“ und „Calisthenics“; die Stufe steht im Untertitel. Alle Vorlagen-Übungen bringen einen Technik-Hinweis aus der Übungsbibliothek mit.","Programmnamen bleiben in Überschriften einzeilig; zu lange Namen enden mit „…“.","Die eingebaute Anleitung für ChatGPT & Co. ist rundum aktualisiert: korrekter Import-Weg, alle Meta-Felder mit Grenzen und erlaubten Werten, Warm-up und Cool-down erklärt."]},
 {version:"v0.30.0",date:"22.07.2026",changes:["Die Auswertung ist neu aufgebaut: Einheiten, Trainingszeit und Bewegtes Gewicht stehen untereinander in voller Breite; die bisherigen Fenster zum Blockfortschritt und zum Einheiten-Verlauf entfallen.","Fortschritt je Übung: Gleiche Übungen an mehreren Wochentagen bilden eine gemeinsame Karte. Jede Karte zeigt immer zwölf Balkenplätze – ein Balken je Ausführung, skaliert zwischen schlechtester und bester Ausführung, damit der Verlauf wirklich sichtbar wird.","Das vollständige Trainingsprotokoll ist eine eigene Seite mit Zurück-Pfeil und eigenem Drucken/PDF-Knopf; die Auswertung druckt jetzt ohne Protokoll.","Scrollbalken sind in der ganzen App ausgeblendet – Scrollen funktioniert unverändert."]},
 {version:"v0.29.0",date:"22.07.2026",changes:["Verpasste Trainings blockieren nicht mehr: Einheiten der Folgewoche lassen sich starten, und leere oder angebrochene Einheiten aller vergangenen Wochen können jederzeit nachgeholt werden.","„Übungen neu ordnen“ wie in großen Trainingsapps: Übung am Griff ziehen, die Liste rückt live mit; bei offenen Fenstern ist der Hintergrund jetzt immer gesperrt.","Die Satzpause startet sofort nach dem vollständigen Satz, und die Verlaufszeile des anderen Trainingstags ist kompakt und einzeilig.","„Programm prüfen“ im Stil der Startseite mit aufklappbaren Tageskarten, Wochenstruktur und genau zwei Aktionen; der alte Zwischen-Hub „Neues Programm“ entfällt.","Jede Programmkarte hat ein Drei-Punkte-Menü mit „Fortschritt zurücksetzen“ und „Programm löschen“; Editor, Manuell-Ansicht und alle Hinweisfenster folgen vollständig dem neuen Design.","Die Backup-Erinnerung kommt als deutliches Hinweisfenster – nach 14 Tagen oder fünf neuen Trainings; „Workout bearbeiten“ wirkt nicht mehr eingegraut."]},
 {version:"v0.28.0",date:"21.07.2026",changes:["Rundum erneuertes Design: neue Farb- und Typografie-Basis mit Smaragd-Akzent in dunklem und hellem Schema; die Schriften liegen lokal in der App und bleiben offline verfügbar.","Neue Startseite mit großer Wochenkarte, Blockfortschritt und aufklappbaren Übungszeilen; während des Trainings zeigt der Kopf eine Live-Zeitkarte mit der laufenden Trainingszeit.","Ein Zahnrad oben rechts öffnet die neuen Einstellungen mit Farbmodus-Wahl und Datensicherung; jede Übungskarte hat ein Drei-Punkte-Menü mit Neuordnen, Tauschen, Scheibenrechner und Entfernen.","Das Programme-Fenster ist eine Vollbild-Ansicht mit aktivem Programm, vier Erstellen-Kacheln und Programmvorlagen als Karten; das aktive Programm und die Vorlagen lassen sich direkt teilen.","Die Auswertung zeigt Prozent-Pillen und Wochen-Balken je Übung; „Workout bearbeiten“ ersetzt „Training wiederholen“, und die Backup-Erinnerung kommt bereits nach drei Trainings.","Der Programmeditor wurde für iPhones korrigiert, und Bestandsnutzer sehen einmalig einen kurzen Hinweis auf das neue Design."]},
 {version:"v0.27.0",date:"21.07.2026",changes:["Kommt dieselbe Übung an mehreren Trainingstagen vor, zeigt die Trainingskarte zusätzlich den jüngsten eingetragenen Wert des anderen Tages.","Nach einem beendeten Training fragt Satzkraft für jede getauschte Übung einzeln, ob der Tausch dauerhaft gelten oder einmalig bleiben soll; die nächste Woche zeigt die Progressionsempfehlung direkt an der Übung.","Zeitvorgaben und protokollierte Zeitwerte erscheinen einheitlich im Format Minuten:Sekunden, und die automatische Satzpause startet auch nach dem letzten Satz.","Trainingskarten, Programmeditor und Programmverwaltung wurden aufgeräumt; Programmkarten nutzen klare Textaktionen, und eine PDF-Anleitung erklärt den Programmeditor.","Die App startet nach einem Update direkt in der Trainingsansicht; beim Fortsetzen eines unterbrochenen Trainings zählt das Sicherheitslimit nur für den aktuellen Abschnitt.","Fehler behoben: Protokollaktionen brechen auf kleinen Bildschirmen sauber um, „Calisthenics Einstieg“ lädt wieder fehlerfrei, und Deload-Empfehlungen für Zeit- und Körpergewichtsübungen sind wieder logisch."]},

function hasExistingTrainingData(state){
 if(!state||!state.programs||!state.store)return false;
 if(Object.keys(state.programs).length>1)return true;
 if(state.active&&state.active!=="default")return true;
 var ids=Object.keys(state.store);
 for(var i=0;i<ids.length;i++){
  var st=state.store[ids[i]];
  if(!st)continue;
  if(Array.isArray(st.history)&&st.history.length)return true;
  if(st.logs&&typeof st.logs==="object"&&Object.keys(st.logs).length)return true;
  if(st.tg&&typeof st.tg==="object"&&Object.keys(st.tg).length)return true;
  if(st.workout)return true;
 }
 return false;
}
